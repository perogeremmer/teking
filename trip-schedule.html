<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jadwal Trip - Open Trip Marketplace</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/dayjs@1/dayjs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dayjs@1/locale/id.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            forest: '#064e3b',
            'forest-light': '#065f46',
          }
        }
      }
    }
  </script>
  <style>
    .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background-color: #e2e8f0; border: 1px solid #e2e8f0; border-radius: 12px; overflow: hidden; }
    .calendar-cell { 
      background: white;
      min-height: 64px;
      padding: 4px;
      display: flex;
      flex-direction: column;
      position: relative;
    }
    .calendar-cell:hover { background-color: #f8fafc; }
    .schedule-bar {
      height: 16px;
      border-radius: 3px;
      font-size: 9px;
      display: flex;
      align-items: center;
      padding: 0 4px;
      color: white;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 1px;
      cursor: pointer;
    }
    .schedule-bar:hover { opacity: 0.8; }
    .more-badge {
      font-size: 9px;
      color: #f97316;
      font-weight: 600;
      padding: 0 2px;
    }
    .today-cell { background-color: #fff7ed !important; }
    .today-number { 
      width: 22px; 
      height: 22px; 
      background-color: #f97316; 
      color: white; 
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: bold;
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 pb-24">
  
  <!-- Header -->
  <header class="sticky top-0 z-40 bg-forest shadow-lg">
    <div class="max-w-md mx-auto px-4 py-3">
      <div class="flex items-center space-x-3">
        <button onclick="history.back()" class="text-white text-xl">←</button>
        <div>
          <h1 class="text-white font-bold text-lg">Jadwal Trip</h1>
          <p id="trip-subtitle" class="text-white/70 text-sm"></p>
        </div>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="max-w-md mx-auto px-4 py-4">
    
    <!-- Trip Info Card -->
    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-4 mb-4">
      <div class="flex items-center space-x-3">
        <img id="trip-image" src="" alt="" class="w-16 h-16 rounded-xl object-cover">
        <div class="flex-1">
          <h2 id="trip-name" class="font-bold text-slate-800"></h2>
          <p id="trip-operator" class="text-xs text-slate-500"></p>
          <div class="flex items-center space-x-3 text-xs text-slate-400 mt-1">
            <span>⛰️ <span id="trip-mountain"></span></span>
            <span>💰 <span id="trip-price"></span></span>
          </div>
        </div>
      </div>
    </div>

    <!-- Calendar Navigation -->
    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-4 mb-4">
      <div class="flex items-center justify-between mb-4">
        <button onclick="changeMonth(-1)" class="w-10 h-10 rounded-xl bg-slate-100 flex items-center justify-center text-lg">←</button>
        <h3 id="calendar-month" class="font-bold text-lg text-slate-800"></h3>
        <button onclick="changeMonth(1)" class="w-10 h-10 rounded-xl bg-slate-100 flex items-center justify-center text-lg">→</button>
      </div>
      
      <!-- Days Header -->
      <div class="calendar-grid mb-0">
        <div class="calendar-cell bg-slate-50 items-center justify-center"><span class="text-xs font-medium text-slate-500">Sen</span></div>
        <div class="calendar-cell bg-slate-50 items-center justify-center"><span class="text-xs font-medium text-slate-500">Sel</span></div>
        <div class="calendar-cell bg-slate-50 items-center justify-center"><span class="text-xs font-medium text-slate-500">Rab</span></div>
        <div class="calendar-cell bg-slate-50 items-center justify-center"><span class="text-xs font-medium text-slate-500">Kam</span></div>
        <div class="calendar-cell bg-slate-50 items-center justify-center"><span class="text-xs font-medium text-slate-500">Jum</span></div>
        <div class="calendar-cell bg-slate-50 items-center justify-center"><span class="text-xs font-medium text-slate-500">Sab</span></div>
        <div class="calendar-cell bg-slate-50 items-center justify-center"><span class="text-xs font-medium text-slate-500">Min</span></div>
      </div>
      
      <!-- Calendar Grid -->
      <div id="calendar-days" class="calendar-grid"></div>
    </div>

    <!-- Legend -->
    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-4 mb-4">
      <p class="text-xs text-slate-500 mb-2">Klik tanggal untuk lihat detail jadwal</p>
      <div class="flex flex-wrap gap-2 text-xs">
        <div class="flex items-center space-x-1">
          <span class="w-8 h-3 rounded bg-orange-500"></span>
          <span class="text-slate-600">Tersedia</span>
        </div>
        <div class="flex items-center space-x-1">
          <span class="w-5 h-5 rounded-full bg-orange-500 text-white flex items-center justify-center text-[10px] font-bold">15</span>
          <span class="text-slate-600">Hari ini</span>
        </div>
      </div>
    </div>

    <!-- Schedule List -->
    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-4">
      <h3 class="font-bold text-slate-800 mb-3">📅 Semua Jadwal</h3>
      <div id="schedule-list" class="space-y-2"></div>
    </div>

  </main>

  <!-- Schedule Popup (Multiple Schedules) -->
  <div id="schedule-popup" class="fixed inset-0 bg-black/50 z-50 hidden flex items-end">
    <div class="bg-white rounded-t-3xl w-full max-w-md mx-auto p-6 transform transition-transform duration-300 translate-y-full">
      <div class="flex items-center justify-between mb-4">
        <h3 id="popup-title" class="font-bold text-lg">Detail Jadwal</h3>
        <button onclick="closePopup()" class="text-slate-400 text-xl">✕</button>
      </div>
      
      <div id="popup-content" class="space-y-3 max-h-[60vh] overflow-y-auto"></div>
    </div>
  </div>

  <script src="assets/js/app.js"></script>
  <script>
    let currentTrip = null;
    let currentDate = new Date(2024, 4, 1); // May 2024
    const scheduleColors = [
      'bg-orange-500',
      'bg-orange-600', 
      'bg-amber-500',
      'bg-yellow-500',
      'bg-red-500'
    ];

    // Load Trip
    function loadTrip() {
      const tripId = getURLParam('id');
      currentTrip = getTripById(tripId);
      
      if (!currentTrip) {
        showToast('Trip tidak ditemukan', 'error');
        return;
      }
      
      const mountain = getMountainByTrip(tripId);
      const operator = getOperatorByTrip(tripId);
      
      document.getElementById('trip-name').textContent = currentTrip.name;
      document.getElementById('trip-subtitle').textContent = `${mountain?.name} - ${operator?.name}`;
      document.getElementById('trip-image').src = mountain?.image || '';
      document.getElementById('trip-operator').textContent = operator?.name || '';
      document.getElementById('trip-mountain').textContent = mountain?.name || '';
      document.getElementById('trip-price').textContent = formatPrice(currentTrip.price);
      
      renderCalendar();
      renderScheduleList();
    }

    // Render Calendar - Google Calendar Style
    function renderCalendar() {
      dayjs.locale('id');
      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();
      const today = dayjs().format('YYYY-MM-DD');
      
      document.getElementById('calendar-month').textContent = 
        dayjs(new Date(year, month)).format('MMMM YYYY');
      
      const firstDay = new Date(year, month, 1).getDay();
      const adjustedFirstDay = firstDay === 0 ? 6 : firstDay - 1;
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const prevMonthDays = new Date(year, month, 0).getDate();
      
      const container = document.getElementById('calendar-days');
      let html = '';
      
      // Previous month days
      for (let i = adjustedFirstDay - 1; i >= 0; i--) {
        const day = prevMonthDays - i;
        html += `<div class="calendar-cell bg-slate-50"><span class="text-xs text-slate-300">${day}</span></div>`;
      }
      
      // Current month days
      for (let day = 1; day <= daysInMonth; day++) {
        const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        const schedules = getAllSchedulesOnDate(currentTrip.id, dateStr);
        const isToday = dateStr === today;
        
        let cellClass = 'calendar-cell';
        if (isToday) cellClass += ' today-cell';
        
        let barsHtml = '';
        const maxBars = 3;
        
        schedules.slice(0, maxBars).forEach((sched, idx) => {
          const colorClass = scheduleColors[idx % scheduleColors.length];
          const label = schedules.length === 1 ? 'Trip' : `#${idx + 1}`;
          barsHtml += `
            <div class="schedule-bar ${colorClass}" onclick="event.stopPropagation(); selectSchedule('${sched.id}')">
              ${label}
            </div>
          `;
        });
        
        if (schedules.length > maxBars) {
          barsHtml += `<span class="more-badge">+${schedules.length - maxBars} lainnya</span>`;
        }
        
        const numberClass = isToday ? 'today-number' : 'text-xs text-slate-700 font-medium';
        const clickHandler = schedules.length > 0 ? `onclick="showDateSchedules('${dateStr}')"` : '';
        
        html += `
          <div class="${cellClass}" ${clickHandler} style="cursor: ${schedules.length > 0 ? 'pointer' : 'default'}">
            <div class="${numberClass} mb-1">${day}</div>
            ${barsHtml}
          </div>
        `;
      }
      
      // Next month days (fill remaining cells to complete the grid)
      const totalCells = adjustedFirstDay + daysInMonth;
      const remainingCells = (7 - (totalCells % 7)) % 7;
      
      for (let day = 1; day <= remainingCells; day++) {
        html += `<div class="calendar-cell bg-slate-50"><span class="text-xs text-slate-300">${day}</span></div>`;
      }
      
      container.innerHTML = html;
    }

    // Show All Schedules on Date
    function showDateSchedules(dateStr) {
      const schedules = getAllSchedulesOnDate(currentTrip.id, dateStr);
      if (schedules.length === 0) return;
      
      if (schedules.length === 1) {
        selectSchedule(schedules[0].id);
        return;
      }
      
      // Multiple schedules - show popup list
      document.getElementById('popup-title').textContent = `Jadwal ${dayjs(dateStr).format('D MMMM YYYY')}`;
      
      const content = document.getElementById('popup-content');
      content.innerHTML = schedules.map((sched, idx) => {
        const colorClass = scheduleColors[idx % scheduleColors.length];
        return `
          <div onclick="selectSchedule('${sched.id}')" class="p-3 rounded-xl border border-slate-100 cursor-pointer hover:bg-slate-50 transition-colors">
            <div class="flex items-center space-x-2 mb-2">
              <span class="w-3 h-3 rounded-full ${colorClass}"></span>
              <span class="font-bold text-sm">${formatDate(sched.date_start)} - ${formatDate(sched.date_end)}</span>
            </div>
            <div class="text-xs text-slate-500 space-y-1">
              <div>⏱️ ${currentTrip.duration}</div>
              <div class="${sched.quota_remaining < 5 ? 'text-red-500 font-semibold' : 'text-green-600'}">
                👥 Sisa ${sched.quota_remaining} / ${sched.quota_total} slot
              </div>
            </div>
          </div>
        `;
      }).join('');
      
      openPopup();
    }

    // Select Single Schedule
    function selectSchedule(scheduleId) {
      const schedule = getScheduleById(currentTrip.id, scheduleId);
      if (!schedule) return;
      
      document.getElementById('popup-title').textContent = 'Detail Jadwal';
      
      const content = document.getElementById('popup-content');
      content.innerHTML = `
        <div class="flex items-center space-x-3 mb-3">
          <div class="w-12 h-12 rounded-xl bg-orange-100 flex items-center justify-center">
            <span class="text-2xl">📅</span>
          </div>
          <div>
            <p class="font-bold text-slate-800">${formatDate(schedule.date_start)} - ${formatDate(schedule.date_end)}</p>
            <p class="text-xs text-slate-500">${currentTrip.duration}</p>
          </div>
        </div>
        
        <div class="space-y-2">
          <div class="flex justify-between text-sm">
            <span class="text-slate-500">Kuota</span>
            <span class="font-medium ${schedule.quota_remaining < 5 ? 'text-red-500' : 'text-slate-800'}">
              ${schedule.quota_remaining} / ${schedule.quota_total} slot
            </span>
          </div>
          <div class="flex justify-between text-sm">
            <span class="text-slate-500">Harga</span>
            <span class="font-medium text-orange-600">${formatPrice(currentTrip.price)}</span>
          </div>
          <div class="flex justify-between text-sm">
            <span class="text-slate-500">Meeting Point</span>
            <span class="font-medium text-slate-800 text-right max-w-[60%]">${currentTrip.meeting_point}</span>
          </div>
        </div>
        
        <button onclick="bookSchedule('${schedule.id}')" class="w-full mt-4 py-3 bg-orange-500 text-white font-semibold rounded-xl">
          Booking Jadwal Ini
        </button>
      `;
      
      openPopup();
    }

    // Open Popup
    function openPopup() {
      const popup = document.getElementById('schedule-popup');
      popup.classList.remove('hidden');
      setTimeout(() => {
        popup.querySelector('.bg-white').classList.remove('translate-y-full');
      }, 10);
    }

    // Close Popup
    function closePopup() {
      const popup = document.getElementById('schedule-popup');
      popup.querySelector('.bg-white').classList.add('translate-y-full');
      setTimeout(() => {
        popup.classList.add('hidden');
      }, 300);
    }

    // Book Schedule
    function bookSchedule(scheduleId) {
      sessionStorage.setItem('selectedSchedule', JSON.stringify({ tripId: currentTrip.id, scheduleId }));
      navigateTo('trip-detail.html', { id: currentTrip.id, schedule_id: scheduleId });
    }

    // Change Month
    function changeMonth(delta) {
      currentDate.setMonth(currentDate.getMonth() + delta);
      renderCalendar();
      renderScheduleList();
    }

    // Render Schedule List
    function renderScheduleList() {
      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();
      const schedules = getSchedulesByMonth(currentTrip.id, year, month);
      
      const container = document.getElementById('schedule-list');
      
      if (schedules.length === 0) {
        container.innerHTML = `
          <div class="text-center py-4 text-slate-400 text-sm">
            Tidak ada jadwal di bulan ini
          </div>
        `;
        return;
      }
      
      container.innerHTML = schedules.map((sched, idx) => {
        const isLow = sched.quota_remaining < 5;
        const colorClass = scheduleColors[idx % scheduleColors.length];
        return `
          <div onclick="selectSchedule('${sched.id}')" 
               class="flex items-center justify-between p-3 bg-slate-50 rounded-xl cursor-pointer hover:bg-orange-50 transition-colors">
            <div class="flex items-center space-x-2">
              <span class="w-2 h-8 rounded-full ${colorClass}"></span>
              <div>
                <p class="text-sm font-semibold text-slate-800">${formatDate(sched.date_start)} - ${formatDate(sched.date_end)}</p>
                <span class="text-xs ${isLow ? 'text-red-500' : 'text-green-600'}">
                  ${isLow ? '🔥' : '✅'} Sisa ${sched.quota_remaining} slot
                </span>
              </div>
            </div>
            <span class="text-slate-400">></span>
          </div>
        `;
      }).join('');
    }

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      loadTrip();
      renderBottomNav();
    });
  </script>
</body>
</html>
