<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jadwal Trip - Open Trip Marketplace</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/dayjs@1/dayjs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dayjs@1/locale/id.js"></script>
  <!-- FullCalendar -->
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            forest: '#064e3b',
            'forest-light': '#065f46',
          }
        }
      }
    }
  </script>
  <style>
    /* FullCalendar Customization */
    .fc {
      font-family: inherit !important;
    }
    .fc .fc-toolbar.fc-header-toolbar {
      margin-bottom: 12px !important;
      padding: 0 4px;
    }
    .fc .fc-toolbar-title {
      font-size: 16px !important;
      font-weight: 700 !important;
      color: #1e293b;
    }
    .fc .fc-button {
      background: #f1f5f9 !important;
      border: none !important;
      color: #475569 !important;
      padding: 6px 12px !important;
      font-size: 13px !important;
      border-radius: 8px !important;
      box-shadow: none !important;
    }
    .fc .fc-button:hover {
      background: #e2e8f0 !important;
    }
    .fc .fc-button:active {
      background: #cbd5e1 !important;
    }
    .fc .fc-col-header-cell {
      padding: 8px 0 !important;
      background: #f8fafc !important;
    }
    .fc .fc-col-header-cell-cushion {
      font-size: 12px !important;
      font-weight: 600 !important;
      color: #64748b !important;
      text-transform: uppercase;
    }
    .fc .fc-daygrid-day {
      min-height: 80px !important;
    }
    .fc .fc-daygrid-day-number {
      font-size: 13px !important;
      font-weight: 600 !important;
      color: #374151 !important;
      padding: 6px !important;
    }
    .fc .fc-daygrid-day.fc-day-today {
      background-color: #fff7ed !important;
    }
    .fc .fc-daygrid-day.fc-day-today .fc-daygrid-day-number {
      background-color: #f97316 !important;
      color: white !important;
      border-radius: 50% !important;
      width: 28px !important;
      height: 28px !important;
      display: flex !important;
      align-items: center !important;
      justify-content: center !important;
      padding: 0 !important;
      margin: 4px !important;
    }
    /* Event Styling */
    .fc-event {
      border: none !important;
      border-radius: 4px !important;
      padding: 2px 4px !important;
      font-size: 11px !important;
      font-weight: 600 !important;
      cursor: pointer !important;
      margin: 1px 2px !important;
    }
    .fc-event:hover {
      opacity: 0.85 !important;
    }
    .fc-h-event .fc-event-main {
      padding: 2px 4px !important;
    }
    /* Multiple event colors */
    .fc-event.event-color-1 { background-color: #f97316 !important; }
    .fc-event.event-color-2 { background-color: #ea580c !important; }
    .fc-event.event-color-3 { background-color: #d97706 !important; }
    .fc-event.event-color-4 { background-color: #ca8a04 !important; }
    .fc-event.event-color-5 { background-color: #dc2626 !important; }
    
    .fc .fc-daygrid-more-link {
      font-size: 11px !important;
      color: #f97316 !important;
      font-weight: 600 !important;
    }
    .fc .fc-daygrid-dot-event {
      display: none !important;
    }
    .fc .fc-daygrid-event-harness {
      margin-top: 1px !important;
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 pb-24">
  
  <!-- Header -->
  <header class="sticky top-0 z-40 bg-forest shadow-lg">
    <div class="max-w-md mx-auto px-4 py-3">
      <div class="flex items-center space-x-3">
        <button onclick="history.back()" class="text-white text-xl">←</button>
        <div>
          <h1 class="text-white font-bold text-lg">Jadwal Trip</h1>
          <p id="trip-subtitle" class="text-white/70 text-sm"></p>
        </div>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="max-w-md mx-auto px-4 py-4">
    
    <!-- Trip Info Card -->
    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-4 mb-4">
      <div class="flex items-center space-x-3">
        <img id="trip-image" src="" alt="" class="w-16 h-16 rounded-xl object-cover">
        <div class="flex-1">
          <h2 id="trip-name" class="font-bold text-slate-800"></h2>
          <p id="trip-operator" class="text-xs text-slate-500"></p>
          <div class="flex items-center space-x-3 text-xs text-slate-400 mt-1">
            <span>⛰️ <span id="trip-mountain"></span></span>
            <span>💰 <span id="trip-price"></span></span>
          </div>
        </div>
      </div>
    </div>

    <!-- FullCalendar Container -->
    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-3 mb-4">
      <div id="calendar"></div>
    </div>

    <!-- Legend -->
    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-4 mb-4">
      <p class="text-xs text-slate-500 mb-2">Klik jadwal untuk detail dan booking</p>
      <div class="flex flex-wrap gap-3 text-xs">
        <div class="flex items-center space-x-1">
          <span class="w-8 h-4 rounded bg-orange-500"></span>
          <span class="text-slate-600">Jadwal tersedia</span>
        </div>
        <div class="flex items-center space-x-1">
          <span class="w-6 h-6 rounded-full bg-orange-500 text-white flex items-center justify-center text-[10px] font-bold">15</span>
          <span class="text-slate-600">Hari ini</span>
        </div>
      </div>
    </div>

    <!-- Schedule List -->
    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-4">
      <h3 class="font-bold text-slate-800 mb-3">📅 Semua Jadwal</h3>
      <div id="schedule-list" class="space-y-2"></div>
    </div>

  </main>

  <!-- Schedule Popup -->
  <div id="schedule-popup" class="fixed inset-0 bg-black/50 z-50 hidden flex items-end">
    <div class="bg-white rounded-t-3xl w-full max-w-md mx-auto p-6 transform transition-transform duration-300 translate-y-full">
      <div class="flex items-center justify-between mb-4">
        <h3 id="popup-title" class="font-bold text-lg">Detail Jadwal</h3>
        <button onclick="closePopup()" class="text-slate-400 text-xl">✕</button>
      </div>
      
      <div id="popup-content" class="space-y-3 max-h-[60vh] overflow-y-auto"></div>
    </div>
  </div>

  <script src="assets/js/app.js"></script>
  <script>
    let currentTrip = null;
    let calendar = null;
    const scheduleColors = [
      'event-color-1',
      'event-color-2', 
      'event-color-3',
      'event-color-4',
      'event-color-5'
    ];

    // Load Trip
    function loadTrip() {
      const tripId = getURLParam('id');
      currentTrip = getTripById(tripId);
      
      if (!currentTrip) {
        showToast('Trip tidak ditemukan', 'error');
        return;
      }
      
      const mountain = getMountainByTrip(tripId);
      const operator = getOperatorByTrip(tripId);
      
      document.getElementById('trip-name').textContent = currentTrip.name;
      document.getElementById('trip-subtitle').textContent = `${mountain?.name} - ${operator?.name}`;
      document.getElementById('trip-image').src = mountain?.image || '';
      document.getElementById('trip-operator').textContent = operator?.name || '';
      document.getElementById('trip-mountain').textContent = mountain?.name || '';
      document.getElementById('trip-price').textContent = formatPrice(currentTrip.price);
      
      initCalendar();
      renderScheduleList();
    }

    // Initialize FullCalendar
    function initCalendar() {
      const calendarEl = document.getElementById('calendar');
      
      // Convert schedules to FullCalendar events
      const events = currentTrip.schedules.map((sched, idx) => ({
        id: sched.id,
        title: `${dayjs(sched.date_start).format('D')} - ${dayjs(sched.date_end).format('D MMM')}`,
        start: sched.date_start,
        end: dayjs(sched.date_end).add(1, 'day').format('YYYY-MM-DD'), // FullCalendar end is exclusive
        className: scheduleColors[idx % scheduleColors.length],
        extendedProps: {
          schedule: sched,
          trip: currentTrip
        }
      }));
      
      calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: 'dayGridMonth',
        locale: 'id',
        firstDay: 1, // Monday
        headerToolbar: {
          left: 'prev',
          center: 'title',
          right: 'next'
        },
        height: 'auto',
        events: events,
        eventDisplay: 'block',
        displayEventTime: false,
        dayMaxEvents: 3,
        moreLinkContent: (args) => `+${args.num} lainnya`,
        eventClick: (info) => {
          info.jsEvent.preventDefault();
          selectSchedule(info.event.id);
        },
        dateClick: (info) => {
          const schedules = getAllSchedulesOnDate(currentTrip.id, info.dateStr);
          if (schedules.length > 0) {
            showDateSchedules(info.dateStr);
          }
        },
        buttonText: {
          today: 'Hari Ini'
        }
      });
      
      calendar.render();
    }

    // Show All Schedules on Date
    function showDateSchedules(dateStr) {
      const schedules = getAllSchedulesOnDate(currentTrip.id, dateStr);
      if (schedules.length === 0) return;
      
      if (schedules.length === 1) {
        selectSchedule(schedules[0].id);
        return;
      }
      
      document.getElementById('popup-title').textContent = `Jadwal ${dayjs(dateStr).format('D MMMM YYYY')}`;
      
      const content = document.getElementById('popup-content');
      content.innerHTML = schedules.map((sched, idx) => {
        const colorClass = scheduleColors[idx % scheduleColors.length];
        return `
          <div onclick="selectSchedule('${sched.id}')" class="p-3 rounded-xl border border-slate-100 cursor-pointer hover:bg-slate-50 transition-colors">
            <div class="flex items-center space-x-2 mb-2">
              <span class="w-3 h-3 rounded-full ${colorClass.replace('event-color-', 'bg-orange-')}"></span>
              <span class="font-bold text-sm">${formatDate(sched.date_start)} - ${formatDate(sched.date_end)}</span>
            </div>
            <div class="text-xs text-slate-500 space-y-1">
              <div>⏱️ ${currentTrip.duration}</div>
              <div class="${sched.quota_remaining < 5 ? 'text-red-500 font-semibold' : 'text-green-600'}">
                👥 Sisa ${sched.quota_remaining} / ${sched.quota_total} slot
              </div>
            </div>
          </div>
        `;
      }).join('');
      
      openPopup();
    }

    // Select Single Schedule
    function selectSchedule(scheduleId) {
      const schedule = getScheduleById(currentTrip.id, scheduleId);
      if (!schedule) return;
      
      document.getElementById('popup-title').textContent = 'Detail Jadwal';
      
      const content = document.getElementById('popup-content');
      content.innerHTML = `
        <div class="flex items-center space-x-3 mb-3">
          <div class="w-12 h-12 rounded-xl bg-orange-100 flex items-center justify-center">
            <span class="text-2xl">📅</span>
          </div>
          <div>
            <p class="font-bold text-slate-800">${formatDate(schedule.date_start)} - ${formatDate(schedule.date_end)}</p>
            <p class="text-xs text-slate-500">${currentTrip.duration}</p>
          </div>
        </div>
        
        <div class="space-y-2">
          <div class="flex justify-between text-sm">
            <span class="text-slate-500">Kuota</span>
            <span class="font-medium ${schedule.quota_remaining < 5 ? 'text-red-500' : 'text-slate-800'}">
              ${schedule.quota_remaining} / ${schedule.quota_total} slot
            </span>
          </div>
          <div class="flex justify-between text-sm">
            <span class="text-slate-500">Harga</span>
            <span class="font-medium text-orange-600">${formatPrice(currentTrip.price)}</span>
          </div>
          <div class="flex justify-between text-sm">
            <span class="text-slate-500">Meeting Point</span>
            <span class="font-medium text-slate-800 text-right max-w-[60%]">${currentTrip.meeting_point}</span>
          </div>
        </div>
        
        <button onclick="bookSchedule('${schedule.id}')" class="w-full mt-4 py-3 bg-orange-500 text-white font-semibold rounded-xl">
          Booking Jadwal Ini
        </button>
      `;
      
      openPopup();
    }

    // Open Popup
    function openPopup() {
      const popup = document.getElementById('schedule-popup');
      popup.classList.remove('hidden');
      setTimeout(() => {
        popup.querySelector('.bg-white').classList.remove('translate-y-full');
      }, 10);
    }

    // Close Popup
    function closePopup() {
      const popup = document.getElementById('schedule-popup');
      popup.querySelector('.bg-white').classList.add('translate-y-full');
      setTimeout(() => {
        popup.classList.add('hidden');
      }, 300);
    }

    // Book Schedule
    function bookSchedule(scheduleId) {
      sessionStorage.setItem('selectedSchedule', JSON.stringify({ tripId: currentTrip.id, scheduleId }));
      navigateTo('trip-detail.html', { id: currentTrip.id, schedule_id: scheduleId });
    }

    // Render Schedule List
    function renderScheduleList() {
      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();
      const schedules = getSchedulesByMonth(currentTrip.id, year, month);
      
      const container = document.getElementById('schedule-list');
      
      if (schedules.length === 0) {
        container.innerHTML = `
          <div class="text-center py-4 text-slate-400 text-sm">
            Tidak ada jadwal di bulan ini
          </div>
        `;
        return;
      }
      
      container.innerHTML = schedules.map((sched, idx) => {
        const isLow = sched.quota_remaining < 5;
        const colorClass = scheduleColors[idx % scheduleColors.length];
        return `
          <div onclick="selectSchedule('${sched.id}')" 
               class="flex items-center justify-between p-3 bg-slate-50 rounded-xl cursor-pointer hover:bg-orange-50 transition-colors">
            <div class="flex items-center space-x-2">
              <span class="w-2 h-8 rounded-full ${colorClass.replace('event-color-', 'bg-orange-')}"></span>
              <div>
                <p class="text-sm font-semibold text-slate-800">${formatDate(sched.date_start)} - ${formatDate(sched.date_end)}</p>
                <span class="text-xs ${isLow ? 'text-red-500' : 'text-green-600'}">
                  ${isLow ? '🔥' : '✅'} Sisa ${sched.quota_remaining} slot
                </span>
              </div>
            </div>
            <span class="text-slate-400">></span>
          </div>
        `;
      }).join('');
    }

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      loadTrip();
      renderBottomNav();
    });
  </script>
</body>
</html>
