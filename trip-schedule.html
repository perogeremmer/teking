<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jadwal Trip - Open Trip Marketplace</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/dayjs@1/dayjs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dayjs@1/locale/id.js"></script>
  <script>dayjs.locale('id');</script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            forest: '#064e3b',
            'forest-light': '#065f46',
          }
        }
      }
    }
  </script>
  <style>
    .calendar-wrapper {
      border-radius: 12px;
      overflow: hidden;
      background: #e2e8f0;
      gap: 1px;
      display: flex;
      flex-direction: column;
    }
    .week-row {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 1px;
      background: #e2e8f0;
      min-height: 120px;
      position: relative;
    }
    .day-cell {
      background: white;
      padding: 4px;
      font-size: 12px;
      display: flex;
      flex-direction: column;
      position: relative;
      z-index: 1;
    }
    .day-cell.other-month {
      background: #f8fafc;
      color: #cbd5e1;
    }
    .day-cell.today {
      background: #fff7ed;
    }
    .day-number {
      font-weight: 600;
      color: #374151;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      font-size: 12px;
      margin-bottom: 2px;
    }
    .day-cell.today .day-number {
      background-color: #f97316;
      color: white;
    }
    .day-cell.other-month .day-number {
      color: #cbd5e1;
    }
    
    /* Event bars that span across days */
    .event-bar {
      position: absolute;
      height: 20px;
      font-size: 9px;
      font-weight: 600;
      color: white;
      display: flex;
      align-items: center;
      padding: 0 6px;
      cursor: pointer;
      z-index: 2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      top: 32px;
    }
    .event-bar:hover {
      opacity: 0.85;
    }
    .event-bar.row-0 { top: 32px; }
    .event-bar.row-1 { top: 54px; }
    .event-bar.row-2 { top: 76px; }
    .event-bar.row-3 { top: 98px; }
    
    .event-bar-start {
      border-top-left-radius: 4px;
      border-bottom-left-radius: 4px;
    }
    .event-bar-end {
      border-top-right-radius: 4px;
      border-bottom-right-radius: 4px;
    }
    .event-bar-mid {
      border-radius: 0;
    }
    .event-bar-single {
      border-radius: 4px;
    }
    
    .event-color-1 { background-color: #f97316; }
    .event-color-2 { background-color: #ea580c; }
    .event-color-3 { background-color: #d97706; }
    .event-color-4 { background-color: #ca8a04; }
    .event-color-5 { background-color: #dc2626; }
    
    .calendar-header {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 1px;
      margin-bottom: 1px;
    }
    .calendar-header-day {
      text-align: center;
      padding: 8px 0;
      font-size: 11px;
      font-weight: 600;
      color: #64748b;
      text-transform: uppercase;
      background: #f8fafc;
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 pb-24">
  
  <!-- Header -->
  <header class="sticky top-0 z-40 bg-forest shadow-lg">
    <div class="max-w-md mx-auto px-4 py-3">
      <div class="flex items-center space-x-3">
        <button onclick="history.back()" class="text-white text-xl">←</button>
        <div>
          <h1 class="text-white font-bold text-lg">Jadwal Trip</h1>
          <p id="trip-subtitle" class="text-white/70 text-sm"></p>
        </div>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="max-w-md mx-auto px-4 py-4">
    
    <!-- Trip Info Card -->
    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-4 mb-4">
      <div class="flex items-center space-x-3">
        <img id="trip-image" src="" alt="" class="w-16 h-16 rounded-xl object-cover">
        <div class="flex-1">
          <h2 id="trip-name" class="font-bold text-slate-800"></h2>
          <p id="trip-operator" class="text-xs text-slate-500"></p>
          <div class="flex items-center space-x-3 text-xs text-slate-400 mt-1">
            <span>⛰️ <span id="trip-mountain"></span></span>
            <span>💰 <span id="trip-price"></span></span>
          </div>
        </div>
      </div>
    </div>

    <!-- Calendar Navigation -->
    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-3 mb-4">
      <div class="flex items-center justify-between mb-3">
        <button onclick="changeMonth(-1)" class="p-2 bg-slate-100 rounded-lg hover:bg-slate-200 transition-colors">
          <svg class="w-4 h-4 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
          </svg>
        </button>
        <h3 id="calendar-month-year" class="font-bold text-slate-800"></h3>
        <button onclick="changeMonth(1)" class="p-2 bg-slate-100 rounded-lg hover:bg-slate-200 transition-colors">
          <svg class="w-4 h-4 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
          </svg>
        </button>
      </div>
      
      <!-- Calendar Header -->
      <div class="calendar-header">
        <div class="calendar-header-day">Sen</div>
        <div class="calendar-header-day">Sel</div>
        <div class="calendar-header-day">Rab</div>
        <div class="calendar-header-day">Kam</div>
        <div class="calendar-header-day">Jum</div>
        <div class="calendar-header-day">Sab</div>
        <div class="calendar-header-day">Min</div>
      </div>
      
      <!-- Calendar Grid -->
      <div id="calendar-grid" class="calendar-grid"></div>
    </div>

    <!-- Legend -->
    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-4 mb-4">
      <p class="text-xs text-slate-500 mb-2">Klik jadwal untuk detail dan booking</p>
      <div class="flex flex-wrap gap-3 text-xs">
        <div class="flex items-center space-x-1">
          <span class="w-8 h-4 rounded bg-orange-500"></span>
          <span class="text-slate-600">Jadwal tersedia</span>
        </div>
        <div class="flex items-center space-x-1">
          <span class="w-6 h-6 rounded-full bg-orange-500 text-white flex items-center justify-center text-[10px] font-bold">15</span>
          <span class="text-slate-600">Hari ini</span>
        </div>
      </div>
    </div>

    <!-- Schedule List -->
    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-4">
      <h3 class="font-bold text-slate-800 mb-3">📅 Semua Jadwal</h3>
      <div id="schedule-list" class="space-y-2"></div>
    </div>

  </main>

  <!-- Schedule Popup -->
  <div id="schedule-popup" class="fixed inset-0 bg-black/50 z-50 hidden flex items-end">
    <div class="bg-white rounded-t-3xl w-full max-w-md mx-auto p-6 transform transition-transform duration-300 translate-y-full">
      <div class="flex items-center justify-between mb-4">
        <h3 id="popup-title" class="font-bold text-lg">Detail Jadwal</h3>
        <button onclick="closePopup()" class="text-slate-400 text-xl">✕</button>
      </div>
      
      <div id="popup-content" class="space-y-3 max-h-[60vh] overflow-y-auto"></div>
    </div>
  </div>

  <script src="assets/js/app.js"></script>
  <script>
    let currentTrip = null;
    let currentDate = new Date();
    const scheduleColors = [
      'event-color-1',
      'event-color-2', 
      'event-color-3',
      'event-color-4',
      'event-color-5'
    ];

    // Load Trip
    function loadTrip() {
      const tripId = getURLParam('id');
      currentTrip = getTripById(tripId);
      
      if (!currentTrip) {
        showToast('Trip tidak ditemukan', 'error');
        return;
      }
      
      const mountain = getMountainByTrip(tripId);
      const operator = getOperatorByTrip(tripId);
      
      document.getElementById('trip-name').textContent = currentTrip.name;
      document.getElementById('trip-subtitle').textContent = `${mountain?.name} - ${operator?.name}`;
      document.getElementById('trip-image').src = mountain?.image || '';
      document.getElementById('trip-operator').textContent = operator?.name || '';
      document.getElementById('trip-mountain').textContent = mountain?.name || '';
      document.getElementById('trip-price').textContent = formatPrice(currentTrip.price);
      
      renderCalendar();
      renderScheduleList();
    }

    // Change Month
    function changeMonth(delta) {
      currentDate.setMonth(currentDate.getMonth() + delta);
      renderCalendar();
      renderScheduleList();
    }

    // Render Custom Calendar with Spanning Events
    function renderCalendar() {
      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();
      
      // Update header
      const monthNames = ['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 
                          'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];
      document.getElementById('calendar-month-year').textContent = `${monthNames[month]} ${year}`;
      
      const firstDay = new Date(year, month, 1);
      const startDate = new Date(firstDay);
      startDate.setDate(startDate.getDate() - ((firstDay.getDay() + 6) % 7)); // Start from Monday
      
      const grid = document.getElementById('calendar-grid');
      grid.innerHTML = '';
      grid.className = 'calendar-wrapper';
      
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      
      // Process week by week
      for (let week = 0; week < 6; week++) {
        const weekStart = new Date(startDate);
        weekStart.setDate(startDate.getDate() + (week * 7));
        
        // Create week container
        const weekEl = document.createElement('div');
        weekEl.className = 'week-row';
        
        // Store day cells for this week
        const dayCells = [];
        
        // Generate 7 day cells
        for (let day = 0; day < 7; day++) {
          const cellDate = new Date(weekStart);
          cellDate.setDate(weekStart.getDate() + day);
          
          const dayEl = document.createElement('div');
          dayEl.className = 'day-cell';
          
          if (cellDate.getMonth() !== month) {
            dayEl.classList.add('other-month');
          }
          
          const cellDateStr = dayjs(cellDate).format('YYYY-MM-DD');
          const todayStr = dayjs(today).format('YYYY-MM-DD');
          
          if (cellDateStr === todayStr) {
            dayEl.classList.add('today');
          }
          
          // Day number
          const dayNumber = document.createElement('div');
          dayNumber.className = 'day-number';
          dayNumber.textContent = cellDate.getDate();
          dayEl.appendChild(dayNumber);
          
          // Store cell info
          dayCells.push({
            element: dayEl,
            date: cellDate,
            dateStr: cellDateStr
          });
          
          weekEl.appendChild(dayEl);
        }
        
        // Find all events that overlap with this week
        const weekEvents = [];
        const weekStartStr = dayjs(dayCells[0].date).format('YYYY-MM-DD');
        const weekEndStr = dayjs(dayCells[6].date).format('YYYY-MM-DD');
        
        currentTrip.schedules.forEach((sched, schedIdx) => {
          const schedStart = dayjs(sched.date_start);
          const schedEnd = dayjs(sched.date_end);
          
          // Check if schedule overlaps with this week
          if (schedStart.isAfter(weekEndStr) || schedEnd.isBefore(weekStartStr)) {
            return;
          }
          
          // Find visible start and end within this week
          let visibleStart = schedStart.isBefore(weekStartStr) ? dayjs(weekStartStr) : schedStart;
          let visibleEnd = schedEnd.isAfter(weekEndStr) ? dayjs(weekEndStr) : schedEnd;
          
          // Calculate grid positions (0-6 for Monday-Sunday)
          const startDayIndex = visibleStart.day() === 0 ? 6 : visibleStart.day() - 1;
          const endDayIndex = visibleEnd.day() === 0 ? 6 : visibleEnd.day() - 1;
          
          weekEvents.push({
            schedule: sched,
            colorClass: scheduleColors[schedIdx % scheduleColors.length],
            startIndex: startDayIndex,
            endIndex: endDayIndex,
            isStart: schedStart.format('YYYY-MM-DD') === visibleStart.format('YYYY-MM-DD'),
            isEnd: schedEnd.format('YYYY-MM-DD') === visibleEnd.format('YYYY-MM-DD'),
            startMonth: schedStart.format('MMM'),
            endMonth: schedEnd.format('MMM')
          });
        });
        
        // Sort events by start index, then by duration (longer first)
        weekEvents.sort((a, b) => {
          if (a.startIndex !== b.startIndex) return a.startIndex - b.startIndex;
          return (b.endIndex - b.startIndex) - (a.endIndex - a.startIndex);
        });
        
        // Assign rows to events (stack overlapping events)
        const rowAssignments = [];
        weekEvents.forEach(event => {
          let row = 0;
          while (rowAssignments[row] && rowAssignments[row].some(assigned => 
            !(event.endIndex < assigned.startIndex || event.startIndex > assigned.endIndex)
          )) {
            row++;
          }
          if (!rowAssignments[row]) rowAssignments[row] = [];
          rowAssignments[row].push(event);
          event.row = row;
        });
        
        // Render event bars
        weekEvents.forEach(event => {
          const barEl = document.createElement('div');
          barEl.className = `event-bar ${event.colorClass} row-${event.row}`;
          
          // Calculate position
          const dayWidth = 100 / 7;
          const left = event.startIndex * dayWidth;
          const width = (event.endIndex - event.startIndex + 1) * dayWidth;
          
          barEl.style.left = `${left}%`;
          barEl.style.width = `${width}%`;
          
          // Border radius based on position
          if (event.isStart && event.isEnd) {
            barEl.classList.add('event-bar-single');
          } else if (event.isStart) {
            barEl.classList.add('event-bar-start');
          } else if (event.isEnd) {
            barEl.classList.add('event-bar-end');
          } else {
            barEl.classList.add('event-bar-mid');
          }
          
          // Title - only show text if it's the start of the event or a single day
          if (event.isStart || (event.isStart && event.isEnd)) {
            const title = event.startMonth === event.endMonth 
              ? `${dayjs(event.schedule.date_start).format('D')}-${dayjs(event.schedule.date_end).format('D')} ${event.startMonth}`
              : `${dayjs(event.schedule.date_start).format('D MMM')}-${dayjs(event.schedule.date_end).format('D MMM')}`;
            barEl.textContent = title;
          }
          
          barEl.onclick = (e) => {
            e.stopPropagation();
            selectSchedule(event.schedule.id);
          };
          
          weekEl.appendChild(barEl);
        });
        
        // Add click handler for days
        dayCells.forEach(cell => {
          const schedules = getAllSchedulesOnDate(currentTrip.id, cell.dateStr);
          if (schedules.length > 0) {
            cell.element.style.cursor = 'pointer';
            cell.element.onclick = () => showDateSchedules(cell.dateStr);
          }
        });
        
        grid.appendChild(weekEl);
      }
    }

    // Show All Schedules on Date
    function showDateSchedules(dateStr) {
      const schedules = getAllSchedulesOnDate(currentTrip.id, dateStr);
      if (schedules.length === 0) return;
      
      if (schedules.length === 1) {
        selectSchedule(schedules[0].id);
        return;
      }
      
      document.getElementById('popup-title').textContent = `Jadwal ${dayjs(dateStr).format('D MMMM YYYY')}`;
      
      const content = document.getElementById('popup-content');
      content.innerHTML = schedules.map((sched, idx) => {
        const colorClass = scheduleColors[idx % scheduleColors.length];
        return `
          <div onclick="selectSchedule('${sched.id}')" class="p-3 rounded-xl border border-slate-100 cursor-pointer hover:bg-slate-50 transition-colors">
            <div class="flex items-center space-x-2 mb-2">
              <span class="w-3 h-3 rounded-full ${colorClass.replace('event-color-', 'bg-orange-')}"></span>
              <span class="font-bold text-sm">${formatDate(sched.date_start)} - ${formatDate(sched.date_end)}</span>
            </div>
            <div class="text-xs text-slate-500 space-y-1">
              <div>⏱️ ${currentTrip.duration}</div>
              <div class="${sched.quota_remaining < 5 ? 'text-red-500 font-semibold' : 'text-green-600'}">
                👥 Sisa ${sched.quota_remaining} / ${sched.quota_total} slot
              </div>
            </div>
          </div>
        `;
      }).join('');
      
      openPopup();
    }

    // Select Single Schedule
    function selectSchedule(scheduleId) {
      const schedule = getScheduleById(currentTrip.id, scheduleId);
      if (!schedule) return;
      
      document.getElementById('popup-title').textContent = 'Detail Jadwal';
      
      const content = document.getElementById('popup-content');
      content.innerHTML = `
        <div class="flex items-center space-x-3 mb-3">
          <div class="w-12 h-12 rounded-xl bg-orange-100 flex items-center justify-center">
            <span class="text-2xl">📅</span>
          </div>
          <div>
            <p class="font-bold text-slate-800">${formatDate(schedule.date_start)} - ${formatDate(schedule.date_end)}</p>
            <p class="text-xs text-slate-500">${currentTrip.duration}</p>
          </div>
        </div>
        
        <div class="space-y-2">
          <div class="flex justify-between text-sm">
            <span class="text-slate-500">Kuota</span>
            <span class="font-medium ${schedule.quota_remaining < 5 ? 'text-red-500' : 'text-slate-800'}">
              ${schedule.quota_remaining} / ${schedule.quota_total} slot
            </span>
          </div>
          <div class="flex justify-between text-sm">
            <span class="text-slate-500">Harga</span>
            <span class="font-medium text-orange-600">${formatPrice(currentTrip.price)}</span>
          </div>
          <div class="flex justify-between text-sm">
            <span class="text-slate-500">Meeting Point</span>
            <span class="font-medium text-slate-800 text-right max-w-[60%]">${getMeetingPointsText(currentTrip)}</span>
          </div>
        </div>
        
        <button onclick="bookSchedule('${schedule.id}')" class="w-full mt-4 py-3 bg-orange-500 text-white font-semibold rounded-xl">
          Booking Jadwal Ini
        </button>
      `;
      
      openPopup();
    }

    // Open Popup
    function openPopup() {
      const popup = document.getElementById('schedule-popup');
      popup.classList.remove('hidden');
      setTimeout(() => {
        popup.querySelector('.bg-white').classList.remove('translate-y-full');
      }, 10);
    }

    // Close Popup
    function closePopup() {
      const popup = document.getElementById('schedule-popup');
      popup.querySelector('.bg-white').classList.add('translate-y-full');
      setTimeout(() => {
        popup.classList.add('hidden');
      }, 300);
    }

    // Book Schedule
    function bookSchedule(scheduleId) {
      sessionStorage.setItem('selectedSchedule', JSON.stringify({ tripId: currentTrip.id, scheduleId }));
      navigateTo('trip-detail.html', { id: currentTrip.id, schedule_id: scheduleId });
    }

    // Render Schedule List
    function renderScheduleList() {
      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();
      const schedules = getSchedulesByMonth(currentTrip.id, year, month);
      
      const container = document.getElementById('schedule-list');
      
      if (schedules.length === 0) {
        container.innerHTML = `
          <div class="text-center py-4 text-slate-400 text-sm">
            Tidak ada jadwal di bulan ini
          </div>
        `;
        return;
      }
      
      container.innerHTML = schedules.map((sched, idx) => {
        const isLow = sched.quota_remaining < 5;
        const colorClass = scheduleColors[idx % scheduleColors.length];
        return `
          <div onclick="selectSchedule('${sched.id}')" 
               class="flex items-center justify-between p-3 bg-slate-50 rounded-xl cursor-pointer hover:bg-orange-50 transition-colors">
            <div class="flex items-center space-x-2">
              <span class="w-2 h-8 rounded-full ${colorClass.replace('event-color-', 'bg-orange-')}"></span>
              <div>
                <p class="text-sm font-semibold text-slate-800">${formatDate(sched.date_start)} - ${formatDate(sched.date_end)}</p>
                <span class="text-xs ${isLow ? 'text-red-500' : 'text-green-600'}">
                  ${isLow ? '🔥' : '✅'} Sisa ${sched.quota_remaining} slot
                </span>
              </div>
            </div>
            <span class="text-slate-400">></span>
          </div>
        `;
      }).join('');
    }

    function getMeetingPointsText(trip) {
      // Backward compatibility
      if (trip.meeting_point) return trip.meeting_point;
      
      if (!trip.meeting_points || trip.meeting_points.length === 0) return '-';
      
      // New format - array of IDs
      if (typeof trip.meeting_points[0] === 'string') {
        const names = trip.meeting_points.map(id => {
          const mp = getMeetingPointById(id);
          return mp ? mp.name : id;
        });
        return names.join(', ');
      }
      
      return '-';
    }

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      loadTrip();
      renderBottomNav();
    });
  </script>
</body>
</html>
