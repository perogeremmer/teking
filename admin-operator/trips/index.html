<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manajemen Trip - Admin Operator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
  <link rel="stylesheet" href="../assets/css/admin.css">
</head>
<body class="admin-body">
  
  <aside class="admin-sidebar">
    <div class="sidebar-logo">
      <img src="" alt="" class="operator-logo">
      <div>
        <h2 class="operator-name"></h2>
        <span>Operator Open Trip</span>
      </div>
    </div>
    <nav class="sidebar-menu"></nav>
  </aside>
  
  <div class="sidebar-overlay"></div>
  
  <div class="admin-main">
    
    <header class="admin-header">
      <div class="header-left">
        <button class="menu-toggle"><i class='bx bx-menu'></i></button>
        <div class="header-welcome">
          <h1>Manajemen Trip</h1>
          <p>Kelola dan atur jadwal trip open trip Anda</p>
        </div>
      </div>
      <div class="header-right">
        <button class="notification-btn"><i class='bx bx-bell'></i></button>
        <div class="user-profile" onclick="logout()">
          <img src="" alt="" class="operator-logo">
          <span class="operator-name"></span>
          <span style="color: var(--text-muted); font-size: 12px;"><i class='bx bx-chevron-down'></i></span>
        </div>
      </div>
    </header>
    
    <div class="admin-content">
      
      <div class="search-bar">
        <input type="text" class="search-input" id="search-trip" placeholder="Cari trip..." onkeyup="filterTrips()">
        <select class="form-select" id="filter-status" onchange="filterTrips()" style="width: 160px;">
          <option value="">Semua Status</option>
          <option value="active">Aktif</option>
          <option value="inactive">Nonaktif</option>
        </select>
        <a href="form.html" class="btn btn-primary">+ Tambah Trip</a>
      </div>
      
      <div class="card">
        <div class="card-body">
          <table class="data-table">
            <thead>
              <tr>
                <th>Trip</th>
                <th>Gunung</th>
                <th>Harga</th>
                <th>Jadwal Aktif</th>
                <th>Booking</th>
                <th style="text-align: right;">Aksi</th>
              </tr>
            </thead>
            <tbody id="trips-table">
              <!-- Rendered by JS -->
            </tbody>
          </table>
        </div>
      </div>
      
    </div>
  </div>

  <script src="../../assets/js/app.js"></script>
  <script src="../assets/js/admin.js"></script>
  <script>
    function getTripPrice(trip) {
      let price = 0;
      
      if (trip.package_id) {
        const pkg = getPackageById(trip.package_id);
        if (pkg) price = pkg.price;
      } else if (trip.price) {
        price = trip.price;
      }
      
      if (trip.meeting_points) {
        trip.meeting_points.forEach(mpId => {
          const mp = getMeetingPointById(mpId);
          if (mp && mp.price_addition) {
            price += mp.price_addition;
          }
        });
      }
      
      return price;
    }

    function loadTrips() {
      const trips = getOperatorTrips();
      const tbody = document.getElementById('trips-table');
      
      tbody.innerHTML = trips.map(trip => {
        const mountain = getMountainByTrip(trip.id);
        const activeSchedules = trip.schedules.filter(s => s.quota_remaining > 0).length;
        const totalBookings = getOperatorBookings().filter(b => b.trip_id === trip.id).length;
        const tripPrice = getTripPrice(trip);
        
        return `
          <tr>
            <td>
              <strong>${trip.name}</strong>
              <div style="font-size: 12px; color: var(--text-muted); margin-top: 2px;">${trip.route} • ${trip.duration}</div>
            </td>
            <td>${mountain?.name || '-'}</td>
            <td><strong>${formatCurrency(tripPrice)}</strong></td>
            <td>${activeSchedules} jadwal</td>
            <td>${totalBookings} booking</td>
            <td style="text-align: right;">
              <a href="detail.html?id=${trip.id}" class="btn btn-sm btn-secondary">Detail</a>
              <a href="form.html?id=${trip.id}" class="btn btn-sm btn-secondary">Edit</a>
            </td>
          </tr>
        `;
      }).join('') || `
        <tr>
          <td colspan="6" style="text-align: center; padding: 40px; color: var(--text-muted);">
            <div style="font-size: 32px; margin-bottom: 8px;"><i class='bx bx-mountain'></i></div>
            <div>Belum ada trip</div>
            <div style="font-size: 13px; margin-top: 4px;">Klik "Tambah Trip" untuk membuat trip baru</div>
          </td>
        </tr>
      `;
    }
    
    function filterTrips() {
      const search = document.getElementById('search-trip').value.toLowerCase();
      const rows = document.querySelectorAll('#trips-table tr');
      
      rows.forEach(row => {
        const text = row.textContent.toLowerCase();
        const show = text.includes(search);
        row.style.display = show ? '' : 'none';
      });
    }
    
    document.addEventListener('DOMContentLoaded', () => {
      initAdmin();
      loadTrips();
    });
  </script>
</body>
</html>
