<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paket - Admin Operator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
  <link rel="stylesheet" href="../assets/css/admin.css">
</head>
<body class="admin-body">
  
  <aside class="admin-sidebar">
    <div class="sidebar-logo">
      <img src="" alt="" class="operator-logo">
      <div>
        <h2 class="operator-name"></h2>
        <span>Operator Open Trip</span>
      </div>
    </div>
    <nav class="sidebar-menu"></nav>
  </aside>
  
  <div class="sidebar-overlay"></div>
  
  <div class="admin-main">
    
    <header class="admin-header">
      <div class="header-left">
        <button class="menu-toggle"><i class='bx bx-menu'></i></button>
        <div class="header-welcome">
          <h1>Paket</h1>
          <p>Kelola paket dan fasilitas trip</p>
        </div>
      </div>
      <div class="header-right">
        <button class="notification-btn"><i class='bx bx-bell'></i></button>
        <div class="user-profile" onclick="logout()">
          <img src="" alt="" class="operator-logo">
          <span class="operator-name"></span>
          <span style="color: var(--text-muted); font-size: 12px;"><i class='bx bx-chevron-down'></i></span>
        </div>
      </div>
    </header>
    
    <div class="admin-content">
      
      <div class="search-bar">
        <input type="text" class="search-input" id="search-package" placeholder="Cari paket..." onkeyup="filterPackages()">
        <a href="form.html" class="btn btn-primary">+ Tambah Paket</a>
      </div>
      
      <div class="card">
        <div class="card-body">
          <table class="data-table">
            <thead>
              <tr>
                <th>Nama Paket</th>
                <th>Harga</th>
                <th>Fasilitas</th>
                <th style="text-align: right;">Aksi</th>
              </tr>
            </thead>
            <tbody id="packages-table">
              <!-- Rendered by JS -->
            </tbody>
          </table>
        </div>
      </div>
      
      <div class="alert alert-success" style="margin-top: 16px;">
        <strong>Tips:</strong> Paket yang sudah dibuat dapat dipilih saat menambah trip baru. Harga dan fasilitas akan otomatis terisi.
      </div>
      
    </div>
  </div>

  <script src="../../assets/js/app.js"></script>
  <script src="../assets/js/admin.js"></script>
  <script>
    function loadPackages() {
      const packages = getPackagesByOperator(CURRENT_OPERATOR_ID);
      const tbody = document.getElementById('packages-table');
      
      if (packages.length === 0) {
        tbody.innerHTML = `
          <tr>
            <td colspan="4" style="text-align: center; padding: 40px; color: var(--text-muted);">
              <div style="font-size: 32px; margin-bottom: 8px;"><i class='bx bx-package'></i></div>
              <div>Belum ada paket</div>
              <div style="font-size: 13px; margin-top: 4px;"><a href="form.html" style="color: var(--primary); font-weight: 600;">Tambah paket pertama</a></div>
            </td>
          </tr>
        `;
        return;
      }
      
      tbody.innerHTML = packages.map(pkg => {
        return `
          <tr>
            <td>
              <strong>${pkg.name}</strong>
              <div style="font-size: 12px; color: var(--text-muted); margin-top: 2px;">${pkg.description || '-'}</div>
            </td>
            <td><strong style="color: var(--primary);">${formatCurrency(pkg.price)}</strong></td>
            <td>
              <div style="display: flex; flex-wrap: wrap; gap: 4px;">
                ${pkg.includes.slice(0, 4).map(f => `
                  <span style="font-size: 11px; padding: 4px 10px; background: var(--bg-body); border-radius: 4px; color: var(--text-secondary); font-weight: 500;">${f}</span>
                `).join('')}
                ${pkg.includes.length > 4 ? `<span style="font-size: 11px; padding: 4px 10px; background: var(--bg-body); border-radius: 4px; color: var(--text-muted);">+${pkg.includes.length - 4}</span>` : ''}
              </div>
            </td>
            <td style="text-align: right;">
              <a href="form.html?id=${pkg.id}" class="btn btn-sm btn-secondary">Edit</a>
              <button class="btn btn-sm btn-secondary" onclick="deletePackage('${pkg.id}')">Hapus</button>
            </td>
          </tr>
        `;
      }).join('');
    }
    
    function filterPackages() {
      const search = document.getElementById('search-package').value.toLowerCase();
      const rows = document.querySelectorAll('#packages-table tr');
      
      rows.forEach(row => {
        const text = row.textContent.toLowerCase();
        row.style.display = text.includes(search) ? '' : 'none';
      });
    }
    
    function deletePackage(id) {
      if (!confirm('Apakah Anda yakin ingin menghapus paket ini? Paket yang sedang digunakan di trip tidak dapat dihapus.')) {
        return;
      }
      
      const usedInTrips = TRIPS.filter(trip => trip.package_id === id);
      if (usedInTrips.length > 0) {
        alert('Paket ini sedang digunakan di ' + usedInTrips.length + ' trip. Hapus dari trip terlebih dahulu.');
        return;
      }
      
      const index = PACKAGES.findIndex(pkg => pkg.id === id);
      if (index > -1) {
        PACKAGES.splice(index, 1);
        loadPackages();
        alert('Paket berhasil dihapus');
      }
    }
    
    document.addEventListener('DOMContentLoaded', () => {
      initAdmin();
      loadPackages();
    });
  </script>
</body>
</html>
