<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meeting Point - Admin Operator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
  <link rel="stylesheet" href="../assets/css/admin.css">
</head>
<body class="admin-body">
  
  <aside class="admin-sidebar">
    <div class="sidebar-logo">
      <img src="" alt="" class="operator-logo">
      <div>
        <h2 class="operator-name"></h2>
        <span>Operator Open Trip</span>
      </div>
    </div>
    <nav class="sidebar-menu"></nav>
  </aside>
  
  <div class="sidebar-overlay"></div>
  
  <div class="admin-main">
    
    <header class="admin-header">
      <div class="header-left">
        <button class="menu-toggle"><i class='bx bx-menu'></i></button>
        <div class="header-welcome">
          <h1>Meeting Point</h1>
          <p>Kelola lokasi meeting point untuk trip</p>
        </div>
      </div>
      <div class="header-right">
        <button class="notification-btn"><i class='bx bx-bell'></i></button>
        <div class="user-profile" onclick="logout()">
          <img src="" alt="" class="operator-logo">
          <span class="operator-name"></span>
          <span style="color: var(--text-muted); font-size: 12px;"><i class='bx bx-chevron-down'></i></span>
        </div>
      </div>
    </header>
    
    <div class="admin-content">
      
      <div class="search-bar">
        <input type="text" class="search-input" id="search-meeting-point" placeholder="Cari meeting point..." onkeyup="filterMeetingPoints()">
        <select class="form-select" id="filter-mountain" onchange="filterMeetingPoints()" style="width: 180px;">
          <option value="">Semua Gunung</option>
        </select>
        <a href="form.html" class="btn btn-primary">+ Tambah Meeting Point</a>
      </div>
      
      <div class="card">
        <div class="card-body">
          <table class="data-table">
            <thead>
              <tr>
                <th>Nama</th>
                <th>Gunung</th>
                <th>Tambahan Harga</th>
                <th>Koordinat</th>
                <th style="text-align: right;">Aksi</th>
              </tr>
            </thead>
            <tbody id="meeting-points-table">
              <!-- Rendered by JS -->
            </tbody>
          </table>
        </div>
      </div>
      
      <div class="alert alert-success" style="margin-top: 16px;">
        <strong>Tips:</strong> Meeting point yang sudah dibuat dapat dipilih saat menambah trip baru. Ini menghemat waktu dan memastikan data konsisten.
      </div>
      
    </div>
  </div>

  <script src="../../assets/js/app.js"></script>
  <script src="../assets/js/admin.js"></script>
  <script>
    function loadMeetingPoints() {
      const meetingPoints = getOperatorMeetingPoints();
      const tbody = document.getElementById('meeting-points-table');
      
      if (meetingPoints.length === 0) {
        tbody.innerHTML = `
          <tr>
            <td colspan="5" style="text-align: center; padding: 40px; color: var(--text-muted);">
              <div style="font-size: 32px; margin-bottom: 8px;"><i class='bx bx-map-pin'></i></div>
              <div>Belum ada meeting point</div>
              <div style="font-size: 13px; margin-top: 4px;"><a href="form.html" style="color: var(--primary); font-weight: 600;">Tambah meeting point pertama</a></div>
            </td>
          </tr>
        `;
        return;
      }
      
      tbody.innerHTML = meetingPoints.map(mp => {
        const mountain = getMountainById(mp.mountain_id);
        return `
          <tr data-mountain="${mp.mountain_id}">
            <td>
              <strong>${mp.name}</strong>
              <div style="font-size: 12px; color: var(--text-muted); margin-top: 2px;">${mp.address || '-'}</div>
            </td>
            <td>${mountain?.name || '-'}</td>
            <td>
              ${mp.price_addition > 0 ? `<span style="color: var(--primary); font-weight: 600;">+${formatCurrency(mp.price_addition)}</span>` : '<span style="color: var(--text-muted);">Termasuk</span>'}
            </td>
            <td>
              <span style="font-size: 12px; color: var(--text-secondary);">
                ${mp.location?.lat?.toFixed(4) || '-'}, ${mp.location?.lng?.toFixed(4) || '-'}
              </span>
            </td>
            <td style="text-align: right;">
              <a href="form.html?id=${mp.id}" class="btn btn-sm btn-secondary">Edit</a>
              <button class="btn btn-sm btn-secondary" onclick="deleteMeetingPoint('${mp.id}')">Hapus</button>
            </td>
          </tr>
        `;
      }).join('');
    }
    
    function loadMountainFilter() {
      const select = document.getElementById('filter-mountain');
      const mountains = getMountains();
      
      mountains.forEach(m => {
        const option = document.createElement('option');
        option.value = m.id;
        option.textContent = m.name;
        select.appendChild(option);
      });
    }
    
    function filterMeetingPoints() {
      const search = document.getElementById('search-meeting-point').value.toLowerCase();
      const mountainId = document.getElementById('filter-mountain').value;
      const rows = document.querySelectorAll('#meeting-points-table tr');
      
      rows.forEach(row => {
        const text = row.textContent.toLowerCase();
        let show = text.includes(search);
        
        if (mountainId && show) {
          show = row.dataset.mountain === mountainId;
        }
        
        row.style.display = show ? '' : 'none';
      });
    }
    
    function deleteMeetingPoint(id) {
      if (!confirm('Apakah Anda yakin ingin menghapus meeting point ini? Meeting point yang sedang digunakan di trip tidak dapat dihapus.')) {
        return;
      }
      
      const usedInTrips = TRIPS.filter(trip => trip.meeting_points?.includes(id));
      if (usedInTrips.length > 0) {
        alert('Meeting point ini sedang digunakan di ' + usedInTrips.length + ' trip. Hapus dari trip terlebih dahulu.');
        return;
      }
      
      const index = MEETING_POINTS.findIndex(mp => mp.id === id);
      if (index > -1) {
        MEETING_POINTS.splice(index, 1);
        loadMeetingPoints();
        alert('Meeting point berhasil dihapus');
      }
    }
    
    document.addEventListener('DOMContentLoaded', () => {
      initAdmin();
      loadMountainFilter();
      loadMeetingPoints();
    });
  </script>
</body>
</html>
