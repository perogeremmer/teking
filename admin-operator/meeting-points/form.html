<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form Meeting Point - Admin Operator</title>
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <link rel="stylesheet" href="../assets/css/admin.css">
  <style>
    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 24px;
    }

    .form-group {
      margin-bottom: 8px;
    }

    .form-group.full-width {
      grid-column: 1 / -1;
    }

    .form-label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 8px;
    }

    .map-container {
      height: 400px;
      border-radius: 8px;
      border: 2px solid #e2e8f0;
      margin-bottom: 16px;
    }

    .search-box {
      position: relative;
      margin-bottom: 16px;
    }

    .search-box input {
      width: 100%;
      padding: 10px 14px 10px 40px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 14px;
    }

    .search-box input:focus {
      outline: none;
      border-color: #f97316;
      box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.1);
    }

    .search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: #94a3b8;
    }

    .search-results {
      max-height: 200px;
      overflow-y: auto;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      margin-top: 8px;
      background: white;
      display: none;
    }

    .search-result-item {
      padding: 10px 14px;
      cursor: pointer;
      border-bottom: 1px solid #f1f5f9;
      font-size: 14px;
    }

    .search-result-item:hover {
      background: #fff7ed;
      color: #c2410c;
    }

    .search-result-item:last-child {
      border-bottom: none;
    }

    .coordinate-display {
      display: flex;
      gap: 16px;
      margin-top: 8px;
    }

    .coordinate-display .coord {
      flex: 1;
      padding: 10px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      font-size: 13px;
      color: #475569;
    }

    .coordinate-display .coord label {
      font-size: 11px;
      color: #94a3b8;
      text-transform: uppercase;
      font-weight: 600;
    }
  </style>
</head>
<body class="admin-body">
  
  <aside class="admin-sidebar">
    <div class="sidebar-logo">
      <img src="" alt="" class="operator-logo">
      <div>
        <h2 class="operator-name"></h2>
        <span>Operator Open Trip</span>
      </div>
    </div>
    <nav class="sidebar-menu"></nav>
  </aside>
  
  <div class="sidebar-overlay"></div>
  
  <div class="admin-main">
    
    <header class="admin-header">
      <div class="header-left">
        <button class="menu-toggle">☰</button>
        <h1 class="header-title" id="page-title">Tambah Meeting Point</h1>
      </div>
    </header>
    
    <div class="admin-content">
      
      <div class="card">
        <div class="card-body">
          <form id="meeting-point-form" onsubmit="saveMeetingPoint(event)">
            
            <div class="form-grid">
              <div class="form-group">
                <label class="form-label">Nama Meeting Point *</label>
                <input type="text" class="form-input" id="mp-name" placeholder="Contoh: Cawang UKI / Basecamp Ciremai" required>
              </div>
              
              <div class="form-group">
                <label class="form-label">Gunung *</label>
                <select class="form-input" id="mp-mountain" required>
                  <option value="">Pilih gunung...</option>
                </select>
              </div>
            </div>
            
            <div class="form-group full-width" style="margin-top: 16px;">
              <label class="form-label">Alamat</label>
              <input type="text" class="form-input" id="mp-address" placeholder="Alamat lengkap meeting point...">
            </div>
            
            <div class="form-group full-width">
              <label class="form-label">Tambahan Harga (Rp)</label>
              <input type="number" class="form-input" id="mp-price-addition" placeholder="0" value="0">
              <p style="font-size: 12px; color: #94a3b8; margin-top: 4px;">Biaya tambahan untuk meeting point ini (contoh: transportasi, parkir)</p>
            </div>
            
            <!-- Map Section -->
            <div class="card" style="margin-top: 24px;">
              <div class="card-header">
                <span class="card-title">🗺️ Lokasi di Peta</span>
              </div>
              <div class="card-body">
                <div class="search-box">
                  <span class="search-icon">🔍</span>
                  <input type="text" id="map-search" placeholder="Cari lokasi di peta..." autocomplete="off">
                  <div id="search-results" class="search-results"></div>
                </div>
                
                <div id="map" class="map-container"></div>
                
                <div class="coordinate-display">
                  <div class="coord">
                    <label>Latitude</label>
                    <div id="display-lat">-</div>
                  </div>
                  <div class="coord">
                    <label>Longitude</label>
                    <div id="display-lng">-</div>
                  </div>
                </div>
              </div>
            </div>
            
            <input type="hidden" id="mp-lat">
            <input type="hidden" id="mp-lng">
            
            <div style="display: flex; gap: 12px; margin-top: 24px;">
              <button type="submit" class="btn btn-primary">💾 Simpan Meeting Point</button>
              <a href="index.html" class="btn btn-secondary">❌ Batal</a>
            </div>
            
          </form>
        </div>
      </div>
      
    </div>
  </div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="../../assets/js/app.js"></script>
  <script src="../assets/js/admin.js"></script>
  <script>
    let map;
    let marker;
    let editingId = null;

    document.addEventListener('DOMContentLoaded', () => {
      initAdmin();
      initMap();
      loadMountainOptions();
      loadMeetingPointData();
    });

    function initMap() {
      map = L.map('map').setView([-6.9147, 107.6098], 7);
      
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
      }).addTo(map);

      // Map click to set location
      map.on('click', (e) => {
        setMarker(e.latlng.lat, e.latlng.lng);
      });

      // Search functionality
      const searchInput = document.getElementById('map-search');
      const searchResults = document.getElementById('search-results');
      let searchTimeout;

      searchInput.addEventListener('input', (e) => {
        clearTimeout(searchTimeout);
        const query = e.target.value;
        
        if (query.length < 3) {
          searchResults.style.display = 'none';
          return;
        }

        searchTimeout = setTimeout(() => {
          searchLocation(query);
        }, 500);
      });

      // Hide search results when clicking outside
      document.addEventListener('click', (e) => {
        if (!e.target.closest('.search-box')) {
          searchResults.style.display = 'none';
        }
      });
    }

    async function searchLocation(query) {
      const searchResults = document.getElementById('search-results');
      
      try {
        const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}`);
        const data = await response.json();
        
        if (data.length === 0) {
          searchResults.innerHTML = '<div class="search-result-item">Lokasi tidak ditemukan</div>';
          searchResults.style.display = 'block';
          return;
        }

        searchResults.innerHTML = data.slice(0, 5).map(place => `
          <div class="search-result-item" onclick="goToLocation(${place.lat}, ${place.lon})">
            ${place.display_name}
          </div>
        `).join('');
        
        searchResults.style.display = 'block';
      } catch (error) {
        console.error('Search error:', error);
      }
    }

    function goToLocation(lat, lng) {
      map.setView([lat, lng], 15);
      document.getElementById('search-results').style.display = 'none';
      document.getElementById('map-search').value = '';
      setMarker(lat, lng);
    }

    function setMarker(lat, lng) {
      // Remove existing marker
      if (marker) {
        map.removeLayer(marker);
      }

      // Add new marker
      marker = L.marker([lat, lng])
        .addTo(map)
        .bindPopup('<b>Lokasi Meeting Point</b><br>Lat: ' + lat.toFixed(6) + '<br>Lng: ' + lng.toFixed(6))
        .openPopup();

      // Update hidden inputs and display
      document.getElementById('mp-lat').value = lat;
      document.getElementById('mp-lng').value = lng;
      document.getElementById('display-lat').textContent = lat.toFixed(6);
      document.getElementById('display-lng').textContent = lng.toFixed(6);
    }

    function loadMountainOptions() {
      const select = document.getElementById('mp-mountain');
      const mountains = getMountains();
      
      mountains.forEach(m => {
        const option = document.createElement('option');
        option.value = m.id;
        option.textContent = m.name;
        select.appendChild(option);
      });
    }

    // Save Meeting Point
    function saveMeetingPoint(e) {
      e.preventDefault();
      
      const name = document.getElementById('mp-name').value.trim();
      const mountain_id = document.getElementById('mp-mountain').value;
      const lat = parseFloat(document.getElementById('mp-lat').value);
      const lng = parseFloat(document.getElementById('mp-lng').value);
      
      if (!name || !mountain_id) {
        alert('Harap isi nama dan gunung');
        return;
      }
      
      if (isNaN(lat) || isNaN(lng)) {
        alert('Harap tentukan lokasi di peta');
        return;
      }
      
      const meetingPointData = {
        id: editingId || 'mp-' + Date.now(),
        name,
        mountain_id,
        location: { lat, lng },
        address: document.getElementById('mp-address').value.trim(),
        price_addition: parseInt(document.getElementById('mp-price-addition').value) || 0,
        operator_id: CURRENT_OPERATOR_ID
      };
      
      if (editingId) {
        // Update existing
        const index = MEETING_POINTS.findIndex(mp => mp.id === editingId);
        if (index > -1) {
          MEETING_POINTS[index] = meetingPointData;
        }
      } else {
        // Add new
        MEETING_POINTS.push(meetingPointData);
      }
      
      console.log('Saving meeting point:', meetingPointData);
      alert('✅ Meeting point berhasil disimpan!');
      window.location.href = 'index.html';
    }

    // Load Meeting Point Data for editing
    function loadMeetingPointData() {
      const urlParams = new URLSearchParams(window.location.search);
      const mpId = urlParams.get('id');
      
      if (mpId) {
        const mp = getMeetingPointById(mpId);
        if (mp) {
          editingId = mpId;
          document.getElementById('page-title').textContent = 'Edit Meeting Point';
          
          document.getElementById('mp-name').value = mp.name;
          document.getElementById('mp-mountain').value = mp.mountain_id;
          document.getElementById('mp-address').value = mp.address || '';
          document.getElementById('mp-price-addition').value = mp.price_addition || 0;
          
          if (mp.location) {
            setMarker(mp.location.lat, mp.location.lng);
            map.setView([mp.location.lat, mp.location.lng], 15);
          }
        }
      }
    }
  </script>
</body>
</html>
