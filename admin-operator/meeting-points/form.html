<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form Meeting Point - Admin Operator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
  <link rel="stylesheet" href="../assets/css/admin.css">
</head>
<body class="admin-body">
  
  <aside class="admin-sidebar">
    <div class="sidebar-logo">
      <img src="" alt="" class="operator-logo">
      <div>
        <h2 class="operator-name"></h2>
        <span>Operator Open Trip</span>
      </div>
    </div>
    <nav class="sidebar-menu"></nav>
  </aside>
  
  <div class="sidebar-overlay"></div>
  
  <div class="admin-main">
    
    <header class="admin-header">
      <div class="header-left">
        <button class="menu-toggle"><i class='bx bx-menu'></i></button>
        <div class="header-welcome">
          <h1 id="page-title">Tambah Meeting Point</h1>
          <p>Tentukan lokasi meeting point di peta</p>
        </div>
      </div>
    </header>
    
    <div class="admin-content">
      
      <div class="card">
        <div class="card-body">
          <form id="meeting-point-form" onsubmit="saveMeetingPoint(event)">
            
            <div class="form-grid">
              <div class="form-group">
                <label class="form-label">Nama Meeting Point *</label>
                <input type="text" class="form-input" id="mp-name" placeholder="Contoh: Cawang UKI / Basecamp Ciremai" required>
              </div>
              
              <div class="form-group">
                <label class="form-label">Gunung *</label>
                <select class="form-input" id="mp-mountain" required>
                  <option value="">Pilih gunung...</option>
                </select>
              </div>
            </div>
            
            <div class="form-group" style="margin-top: 16px;">
              <label class="form-label">Alamat</label>
              <input type="text" class="form-input" id="mp-address" placeholder="Alamat lengkap meeting point...">
            </div>
            
            <div class="form-group">
              <label class="form-label">Tambahan Harga (Rp)</label>
              <input type="number" class="form-input" id="mp-price-addition" placeholder="0" value="0">
              <p style="font-size: 12px; color: var(--text-muted); margin-top: 4px;">Biaya tambahan untuk meeting point ini (contoh: transportasi, parkir)</p>
            </div>
            
            <!-- Map Section -->
            <div class="card" style="margin-top: 28px;">
              <div class="card-header">
                <span class="card-title">Lokasi di Peta</span>
              </div>
              <div class="card-body">
                <div class="search-box">
                  <input type="text" id="map-search" placeholder="Cari lokasi di peta..." autocomplete="off">
                  <div id="search-results" class="search-results"></div>
                </div>
                
                <div id="map" style="height: 400px; border-radius: var(--radius); border: 1px solid var(--border-color);"></div>
                
                <div style="display: flex; gap: 16px; margin-top: 12px;">
                  <div style="flex: 1; padding: 12px; background: var(--bg-body); border: 1px solid var(--border-color); border-radius: var(--radius-sm);">
                    <label style="font-size: 11px; color: var(--text-muted); text-transform: uppercase; font-weight: 600;">Latitude</label>
                    <div id="display-lat" style="font-weight: 600; color: var(--text-primary); margin-top: 4px;">-</div>
                  </div>
                  <div style="flex: 1; padding: 12px; background: var(--bg-body); border: 1px solid var(--border-color); border-radius: var(--radius-sm);">
                    <label style="font-size: 11px; color: var(--text-muted); text-transform: uppercase; font-weight: 600;">Longitude</label>
                    <div id="display-lng" style="font-weight: 600; color: var(--text-primary); margin-top: 4px;">-</div>
                  </div>
                </div>
              </div>
            </div>
            
            <input type="hidden" id="mp-lat">
            <input type="hidden" id="mp-lng">
            
            <div style="display: flex; gap: 12px; margin-top: 28px;">
              <button type="submit" class="btn btn-primary">Simpan Meeting Point</button>
              <a href="index.html" class="btn btn-secondary">Batal</a>
            </div>
            
          </form>
        </div>
      </div>
      
    </div>
  </div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="../../assets/js/app.js"></script>
  <script src="../assets/js/admin.js"></script>
  <script>
    let map;
    let marker;
    let editingId = null;

    document.addEventListener('DOMContentLoaded', () => {
      initAdmin();
      initMap();
      loadMountainOptions();
      loadMeetingPointData();
    });

    function initMap() {
      map = L.map('map').setView([-6.9147, 107.6098], 7);
      
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
      }).addTo(map);

      map.on('click', (e) => {
        setMarker(e.latlng.lat, e.latlng.lng);
      });

      const searchInput = document.getElementById('map-search');
      const searchResults = document.getElementById('search-results');
      let searchTimeout;

      searchInput.addEventListener('input', (e) => {
        clearTimeout(searchTimeout);
        const query = e.target.value;
        
        if (query.length < 3) {
          searchResults.style.display = 'none';
          return;
        }

        searchTimeout = setTimeout(() => {
          searchLocation(query);
        }, 500);
      });

      document.addEventListener('click', (e) => {
        if (!e.target.closest('.search-box')) {
          searchResults.style.display = 'none';
        }
      });
    }

    async function searchLocation(query) {
      const searchResults = document.getElementById('search-results');
      
      try {
        const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}`);
        const data = await response.json();
        
        if (data.length === 0) {
          searchResults.innerHTML = '<div class="search-result-item">Lokasi tidak ditemukan</div>';
          searchResults.style.display = 'block';
          return;
        }

        searchResults.innerHTML = data.slice(0, 5).map(place => `
          <div class="search-result-item" onclick="goToLocation(${place.lat}, ${place.lon})">
            ${place.display_name}
          </div>
        `).join('');
        
        searchResults.style.display = 'block';
      } catch (error) {
        console.error('Search error:', error);
      }
    }

    function goToLocation(lat, lng) {
      map.setView([lat, lng], 15);
      document.getElementById('search-results').style.display = 'none';
      document.getElementById('map-search').value = '';
      setMarker(lat, lng);
    }

    function setMarker(lat, lng) {
      if (marker) map.removeLayer(marker);

      marker = L.marker([lat, lng])
        .addTo(map)
        .bindPopup('<b>Lokasi Meeting Point</b>')
        .openPopup();

      document.getElementById('mp-lat').value = lat;
      document.getElementById('mp-lng').value = lng;
      document.getElementById('display-lat').textContent = lat.toFixed(6);
      document.getElementById('display-lng').textContent = lng.toFixed(6);
    }

    function loadMountainOptions() {
      const select = document.getElementById('mp-mountain');
      const mountains = getMountains();
      
      mountains.forEach(m => {
        const option = document.createElement('option');
        option.value = m.id;
        option.textContent = m.name;
        select.appendChild(option);
      });
    }

    function saveMeetingPoint(e) {
      e.preventDefault();
      
      const name = document.getElementById('mp-name').value.trim();
      const mountain_id = document.getElementById('mp-mountain').value;
      const lat = parseFloat(document.getElementById('mp-lat').value);
      const lng = parseFloat(document.getElementById('mp-lng').value);
      
      if (!name || !mountain_id) {
        alert('Harap isi nama dan gunung');
        return;
      }
      
      if (isNaN(lat) || isNaN(lng)) {
        alert('Harap tentukan lokasi di peta');
        return;
      }
      
      const meetingPointData = {
        id: editingId || 'mp-' + Date.now(),
        name,
        mountain_id,
        location: { lat, lng },
        address: document.getElementById('mp-address').value.trim(),
        price_addition: parseInt(document.getElementById('mp-price-addition').value) || 0,
        operator_id: CURRENT_OPERATOR_ID
      };
      
      if (editingId) {
        const index = MEETING_POINTS.findIndex(mp => mp.id === editingId);
        if (index > -1) MEETING_POINTS[index] = meetingPointData;
      } else {
        MEETING_POINTS.push(meetingPointData);
      }
      
      console.log('Saving meeting point:', meetingPointData);
      alert('Meeting point berhasil disimpan!');
      window.location.href = 'index.html';
    }

    function loadMeetingPointData() {
      const urlParams = new URLSearchParams(window.location.search);
      const mpId = urlParams.get('id');
      
      if (mpId) {
        const mp = getMeetingPointById(mpId);
        if (mp) {
          editingId = mpId;
          document.getElementById('page-title').textContent = 'Edit Meeting Point';
          document.title = 'Edit Meeting Point - Admin Operator';
          
          document.getElementById('mp-name').value = mp.name;
          document.getElementById('mp-mountain').value = mp.mountain_id;
          document.getElementById('mp-address').value = mp.address || '';
          document.getElementById('mp-price-addition').value = mp.price_addition || 0;
          
          if (mp.location) {
            setMarker(mp.location.lat, mp.location.lng);
            map.setView([mp.location.lat, mp.location.lng], 15);
          }
        }
      }
    }
  </script>
</body>
</html>
