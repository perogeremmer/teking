<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manajemen Booking - Admin Operator</title>
  <link rel="stylesheet" href="../assets/css/admin.css">
</head>
<body class="admin-body">
  
  <aside class="admin-sidebar">
    <div class="sidebar-logo">
      <img src="" alt="" class="operator-logo">
      <div>
        <h2 class="operator-name"></h2>
        <span>Operator Open Trip</span>
      </div>
    </div>
    <nav class="sidebar-menu"></nav>
  </aside>
  
  <div class="sidebar-overlay"></div>
  
  <div class="admin-main">
    
    <header class="admin-header">
      <div class="header-left">
        <button class="menu-toggle">☰</button>
        <h1 class="header-title">Manajemen Booking</h1>
      </div>
    </header>
    
    <div class="admin-content">
      
      <div class="search-bar">
        <input type="text" class="search-input" id="search-booking" placeholder="🔍 Cari booking..." onkeyup="filterBookings()">
        <select class="form-select" id="filter-status" onchange="filterBookings()" style="width: 150px;">
          <option value="">Semua Status</option>
          <option value="pending">Pending</option>
          <option value="confirmed">Confirmed</option>
          <option value="completed">Completed</option>
          <option value="cancelled">Cancelled</option>
        </select>
        
        <select class="form-select" id="filter-trip" onchange="filterBookings()" style="width: 200px;">
          <option value="">Semua Trip</option>
        </select>
      </div>
      
      <div class="card">
        <div class="card-body">
          <table class="data-table">
            <thead>
              <tr>
                <th>ID</th>
                <th>Customer</th>
                <th>Trip</th>
                <th>Tanggal Trip</th>
                <th>Peserta</th>
                <th>Total</th>
                <th>Status</th>
                <th>Aksi</th>
              </tr>
            </thead>
            <tbody id="bookings-table">
              <!-- Rendered by JS -->
            </tbody>
          </table>
        </div>
      </div>
      
    </div>
  </div>

  <script src="../../assets/js/app.js"></script>
  <script src="../assets/js/admin.js"></script>
  <script>
    function loadTripFilter() {
      const select = document.getElementById('filter-trip');
      const trips = getOperatorTrips();
      trips.forEach(trip => {
        const option = document.createElement('option');
        option.value = trip.id;
        option.textContent = trip.name;
        select.appendChild(option);
      });
    }
    
    function loadBookings() {
      const bookings = getOperatorBookings();
      const tbody = document.getElementById('bookings-table');
      
      tbody.innerHTML = bookings.map(booking => {
        const trip = getTripById(booking.trip_id);
        const schedule = trip?.schedules.find(s => s.id === booking.schedule_id);
        
        return `
          <tr>
            <td>#${booking.id.split('-')[1]}</td>
            <td>
              <strong>${booking.lead_name}</strong><br>
              <span style="font-size: 12px; color: #64748b;">${booking.lead_phone}</span>
            </td>
            <td>${trip?.name || '-'}</td>
            <td>${schedule ? formatDate(schedule.date_start) : '-'}</td>
            <td>${booking.participants.length} orang</td>
            <td>${formatCurrency(booking.total)}</td>
            <td>${getStatusBadge(booking.status)}</td>
            <td>
              <a href="detail.html?id=${booking.id}" class="btn btn-sm btn-secondary">Detail →</a>
            </td>
          </tr>
        `;
      }).join('');
    }
    
    function filterBookings() {
      const search = document.getElementById('search-booking').value.toLowerCase();
      const status = document.getElementById('filter-status').value;
      const tripId = document.getElementById('filter-trip').value;
      
      const rows = document.querySelectorAll('#bookings-table tr');
      
      rows.forEach(row => {
        const text = row.textContent.toLowerCase();
        const showSearch = text.includes(search);
        const showStatus = !status || row.querySelector('.badge')?.textContent.toLowerCase() === status;
        const showTrip = !tripId || row.textContent.includes(getTripById(tripId)?.name || '');
        
        row.style.display = (showSearch && showStatus && showTrip) ? '' : 'none';
      });
    }
    
    document.addEventListener('DOMContentLoaded', () => {
      initAdmin();
      loadTripFilter();
      loadBookings();
    });
  </script>
</body>
</html>
