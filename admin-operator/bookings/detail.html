<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detail Booking - Admin Operator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
  <link rel="stylesheet" href="../assets/css/admin.css">
</head>
<body class="admin-body">
  
  <aside class="admin-sidebar">
    <div class="sidebar-logo">
      <img src="" alt="" class="operator-logo">
      <div>
        <h2 class="operator-name"></h2>
        <span>Operator Open Trip</span>
      </div>
    </div>
    <nav class="sidebar-menu"></nav>
  </aside>
  
  <div class="sidebar-overlay"></div>
  
  <div class="admin-main">
    
    <header class="admin-header">
      <div class="header-left">
        <button class="menu-toggle"><i class='bx bx-menu'></i></button>
        <div class="header-welcome">
          <h1>Detail Booking</h1>
          <p>Informasi lengkap booking dan peserta</p>
        </div>
      </div>
      <div class="header-right">
        <a href="index.html" class="btn btn-secondary">← Kembali</a>
      </div>
    </header>
    
    <div class="admin-content">
      
      <div id="booking-detail">
        <!-- Content rendered by JS -->
      </div>
      
    </div>
  </div>

  <script src="../../assets/js/app.js"></script>
  <script src="../assets/js/admin.js"></script>
  <script>
    function loadBookingDetail() {
      const urlParams = new URLSearchParams(window.location.search);
      const bookingId = urlParams.get('id');
      
      const booking = BOOKINGS.find(b => b.id === bookingId);
      if (!booking) {
        document.getElementById('booking-detail').innerHTML = '<p style="color: var(--text-muted);">Booking tidak ditemukan</p>';
        return;
      }
      
      const trip = getTripById(booking.trip_id);
      const schedule = trip?.schedules.find(s => s.id === booking.schedule_id);
      
      const container = document.getElementById('booking-detail');
      container.innerHTML = `
        <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 24px;">
          
          <div>
            <div class="card">
              <div class="card-header">
                <span class="card-title">Informasi Booking</span>
                <span>${getStatusBadge(booking.status)}</span>
              </div>
              <div class="card-body">
                <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px;">
                  <div>
                    <label style="font-size: 12px; color: var(--text-secondary); font-weight: 600;">ID Booking</label>
                    <p style="font-weight: 600; margin: 4px 0 0 0;">#${booking.id.split('-')[1]}</p>
                  </div>
                  <div>
                    <label style="font-size: 12px; color: var(--text-secondary); font-weight: 600;">Tanggal Booking</label>
                    <p style="font-weight: 600; margin: 4px 0 0 0;">${formatDate(booking.created_at)}</p>
                  </div>
                  <div>
                    <label style="font-size: 12px; color: var(--text-secondary); font-weight: 600;">Trip</label>
                    <p style="font-weight: 600; margin: 4px 0 0 0;">${trip?.name || '-'}</p>
                  </div>
                  <div>
                    <label style="font-size: 12px; color: var(--text-secondary); font-weight: 600;">Jadwal</label>
                    <p style="font-weight: 600; margin: 4px 0 0 0;">${schedule ? `${formatDate(schedule.date_start)} - ${formatDate(schedule.date_end)}` : '-'}</p>
                  </div>
                </div>
              </div>
            </div>
            
            <div class="card">
              <div class="card-header">
                <span class="card-title">Data Customer</span>
              </div>
              <div class="card-body">
                <p style="font-weight: 600; font-size: 16px; margin-bottom: 12px;">${booking.lead_name}</p>
                <div style="display: flex; flex-direction: column; gap: 8px;">
                  <div style="display: flex; align-items: center; gap: 8px; color: var(--text-secondary); font-size: 14px;">
                    <span><i class='bx bx-phone'></i></span>
                    <span>${booking.lead_phone}</span>
                  </div>
                  <div style="display: flex; align-items: center; gap: 8px; color: var(--text-secondary); font-size: 14px;">
                    <span><i class='bx bx-envelope'></i></span>
                    <span>${booking.lead_email}</span>
                  </div>
                </div>
              </div>
            </div>
            
            <div class="card">
              <div class="card-header">
                <span class="card-title">Daftar Peserta (${booking.participants.length} orang)</span>
              </div>
              <div class="card-body">
                <table class="data-table">
                  <thead>
                    <tr>
                      <th>No</th>
                      <th>Nama</th>
                      <th>No. KTP</th>
                    </tr>
                  </thead>
                  <tbody>
                    ${booking.participants.map((p, i) => `
                      <tr>
                        <td>${i + 1}</td>
                        <td>${p.name}</td>
                        <td>${p.ktp}</td>
                      </tr>
                    `).join('')}
                  </tbody>
                </table>
              </div>
            </div>
          </div>
          
          <div>
            <div class="card">
              <div class="card-header">
                <span class="card-title">Ringkasan Biaya</span>
              </div>
              <div class="card-body">
                <div style="display: flex; justify-content: space-between; margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid var(--border-color);">
                  <span style="color: var(--text-secondary);">Harga Trip</span>
                  <span style="font-weight: 600;">${formatCurrency(booking.trip_price)}</span>
                </div>
                <div style="display: flex; justify-content: space-between; margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid var(--border-color);">
                  <span style="color: var(--text-secondary);">Jumlah Peserta</span>
                  <span style="font-weight: 600;">x ${booking.participants.length}</span>
                </div>
                <div style="display: flex; justify-content: space-between; padding-top: 4px;">
                  <span style="font-weight: 700; font-size: 16px;">Total</span>
                  <span style="font-weight: 700; font-size: 20px; color: var(--primary);">${formatCurrency(booking.total)}</span>
                </div>
              </div>
            </div>
            
            <div class="card">
              <div class="card-header">
                <span class="card-title">Update Status</span>
              </div>
              <div class="card-body">
                <div style="display: flex; flex-direction: column; gap: 10px;">
                  <button class="btn btn-primary" onclick="updateStatus('confirmed')" ${booking.status !== 'pending' ? 'disabled style="opacity: 0.5; cursor: not-allowed;"' : ''}>
                    Konfirmasi Booking
                  </button>
                  <button class="btn btn-secondary" onclick="updateStatus('completed')" ${booking.status !== 'confirmed' ? 'disabled style="opacity: 0.5; cursor: not-allowed;"' : ''}>
                    Tandai Selesai
                  </button>
                  <button class="btn btn-secondary" onclick="updateStatus('cancelled')" ${booking.status === 'completed' || booking.status === 'cancelled' ? 'disabled style="opacity: 0.5; cursor: not-allowed;"' : ''}>
                    Batalkan Booking
                  </button>
                </div>
              </div>
            </div>
          </div>
          
        </div>
      `;
    }
    
    function updateStatus(newStatus) {
      const urlParams = new URLSearchParams(window.location.search);
      const bookingId = urlParams.get('id');
      
      const booking = BOOKINGS.find(b => b.id === bookingId);
      if (booking) {
        booking.status = newStatus;
        alert(`Status booking diupdate menjadi: ${newStatus}`);
        loadBookingDetail();
      }
    }
    
    document.addEventListener('DOMContentLoaded', () => {
      initAdmin();
      loadBookingDetail();
    });
  </script>
</body>
</html>
