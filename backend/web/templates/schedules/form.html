{{define "content"}}
<div class="mb-8">
    <a href="/trips/{{.TripID}}" class="text-gray-500 hover:text-gray-700 text-sm flex items-center gap-1 mb-2"><i class="bx bx-arrow-back"></i> Kembali ke trip</a>
    <h1 class="text-2xl font-bold text-gray-900">{{if .EditMode}}Edit Jadwal{{else}}Tambah Jadwal{{end}}</h1>
    <p class="text-gray-500 mt-1">Trip: {{.TripName}}</p>
</div>

<div class="max-w-lg bg-white rounded-xl border border-gray-200 p-6">
    <form method="POST" action="{{if .EditMode}}/schedules/{{.Schedule.ID}}{{else}}/trips/{{.TripID}}/schedules{{end}}">
        {{if .EditMode}}<input type="hidden" name="_method" value="PUT">{{end}}

        {{if not .EditMode}}
        <input type="hidden" name="trip_id" value="{{.TripID}}">
        {{end}}

        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Tanggal Mulai *</label>
                <input type="date" name="date_start" required value="{{if .Schedule}}{{.Schedule.DateStart}}{{end}}"
                    class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500 focus:border-teal-500 outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Tanggal Akhir *</label>
                <input type="date" name="date_end" required value="{{if .Schedule}}{{.Schedule.DateEnd}}{{end}}"
                    class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500 focus:border-teal-500 outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Kuota Total *</label>
                <input type="number" name="quota_total" required min="1" value="{{if .Schedule}}{{.Schedule.QuotaTotal}}{{else}}10{{end}}"
                    class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500 focus:border-teal-500 outline-none">
            </div>
            {{if .EditMode}}
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Kuota Tersisa</label>
                <input type="number" name="quota_remaining" min="0" value="{{.Schedule.QuotaRemaining}}"
                    class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500 focus:border-teal-500 outline-none">
            </div>
            {{end}}
        </div>

        <div class="flex gap-3 mt-6">
            <button type="submit" class="bg-teal-600 text-white px-6 py-2.5 rounded-lg font-semibold hover:bg-teal-700 transition">
                {{if .EditMode}}Simpan{{else}}Tambah Jadwal{{end}}
            </button>
            <a href="/trips/{{.TripID}}" class="bg-gray-100 text-gray-700 px-6 py-2.5 rounded-lg font-medium hover:bg-gray-200 transition">Batal</a>
        </div>
    </form>
</div>
{{end}}
