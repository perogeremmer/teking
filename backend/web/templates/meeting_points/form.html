{{define "content"}}
<div class="mb-8">
    <a href="/meeting-points" class="text-gray-500 hover:text-gray-700 text-sm flex items-center gap-1 mb-2"><i class="bx bx-arrow-back"></i> Kembali</a>
    <h1 class="text-2xl font-bold text-gray-900">{{if .EditMode}}Edit Meeting Point{{else}}Tambah Meeting Point{{end}}</h1>
</div>

{{if .Error}}
<div class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg text-sm mb-6">{{.Error}}</div>
{{end}}

<div class="bg-white rounded-xl border border-gray-200 p-6">
    <form method="POST" action="{{if .EditMode}}/meeting-points/{{.MP.ID}}{{else}}/meeting-points{{end}}">
        {{if .EditMode}}<input type="hidden" name="_method" value="PUT">{{end}}

        <div class="grid grid-cols-1 lg:grid-cols-5 gap-6">
            <div class="lg:col-span-2 space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Nama Meeting Point *</label>
                    <input type="text" name="name" required value="{{if .MP}}{{.MP.Name}}{{end}}"
                        class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500 focus:border-teal-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Tipe</label>
                    <select name="type" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500 focus:border-teal-500 outline-none">
                        <option value="titik_jemput" {{if and .MP (eq .MP.Type "titik_jemput")}}selected{{end}}>Titik Jemput</option>
                        <option value="basecamp" {{if and .MP (eq .MP.Type "basecamp")}}selected{{end}}>Basecamp</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Alamat</label>
                    <input type="text" name="address" value="{{if .MP}}{{.MP.Address}}{{end}}"
                        class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500 focus:border-teal-500 outline-none">
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Latitude</label>
                        <input type="text" name="lat" id="lat"
                            value="{{if .MP}}{{printf "%.6f" .MP.Lat}}{{else}}-6.8947{{end}}"
                            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-teal-500 focus:border-teal-500 outline-none"
                            placeholder="-6.8947">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Longitude</label>
                        <input type="text" name="lng" id="lng"
                            value="{{if .MP}}{{printf "%.6f" .MP.Lng}}{{else}}108.4000{{end}}"
                            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-teal-500 focus:border-teal-500 outline-none"
                            placeholder="108.4000">
                    </div>
                </div>

                <div class="flex gap-3 pt-2">
                    <button type="submit" class="bg-teal-600 text-white px-6 py-2.5 rounded-lg font-semibold hover:bg-teal-700 transition">
                        {{if .EditMode}}Simpan Perubahan{{else}}Simpan{{end}}
                    </button>
                    <a href="/meeting-points" class="bg-gray-100 text-gray-700 px-6 py-2.5 rounded-lg font-medium hover:bg-gray-200 transition">Batal</a>
                </div>
            </div>

            <div class="lg:col-span-3">
                <label class="block text-sm font-medium text-gray-700 mb-1">Lokasi</label>
                <div class="relative">
                    <input type="text" id="mapSearch" placeholder="Cari lokasi... (Enter untuk cari)"
                        class="w-full px-3 py-2 text-sm border border-gray-300 rounded-lg shadow-sm mb-2 focus:ring-2 focus:ring-teal-500 focus:border-teal-500 outline-none">
                    <div id="map" class="w-full h-[400px] rounded-lg border border-gray-300 z-0"></div>
                </div>
                <p class="text-xs text-gray-400 mt-1">Geser marker atau klik peta untuk atur lokasi. Atau edit koordinat langsung di form.</p>
            </div>
        </div>
    </form>
</div>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    window.mpLat = parseFloat(document.getElementById('lat').value) || -6.8947;
    window.mpLng = parseFloat(document.getElementById('lng').value) || 108.4;

    var map = L.map('map').setView([window.mpLat, window.mpLng], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    var marker = L.marker([window.mpLat, window.mpLng], { draggable: true }).addTo(map);

    function updateCoords(lat, lng) {
        document.getElementById('lat').value = lat.toFixed(6);
        document.getElementById('lng').value = lng.toFixed(6);
    }

    marker.on('dragend', function() {
        var ll = marker.getLatLng();
        updateCoords(ll.lat, ll.lng);
    });

    map.on('click', function(e) {
        marker.setLatLng(e.latlng);
        updateCoords(e.latlng.lat, e.latlng.lng);
    });

    // Sync marker when lat/lng inputs change manually
    document.getElementById('lat').addEventListener('input', syncMarker);
    document.getElementById('lng').addEventListener('input', syncMarker);

    function syncMarker() {
        var lat = parseFloat(document.getElementById('lat').value);
        var lng = parseFloat(document.getElementById('lng').value);
        if (!isNaN(lat) && !isNaN(lng)) {
            marker.setLatLng([lat, lng]);
            map.setView([lat, lng], map.getZoom());
        }
    }

    // Geocoding search on Enter
    document.getElementById('mapSearch').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            e.preventDefault();
            var q = this.value.trim();
            if (!q) return;
            fetch('https://nominatim.openstreetmap.org/search?format=json&q=' + encodeURIComponent(q) + '&limit=1')
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    if (data && data.length > 0) {
                        var lat = parseFloat(data[0].lat);
                        var lng = parseFloat(data[0].lon);
                        map.setView([lat, lng], 15);
                        marker.setLatLng([lat, lng]);
                        updateCoords(lat, lng);
                    }
                })
                .catch(function() {});
        }
    });
</script>
{{end}}
