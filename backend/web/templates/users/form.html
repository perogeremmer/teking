{{define "content"}}
<div class="mb-8">
    <a href="/users" class="text-gray-500 hover:text-gray-700 text-sm flex items-center gap-1 mb-2"><i class="bx bx-arrow-back"></i> Kembali</a>
    <h1 class="text-2xl font-bold text-gray-900">{{if .EditMode}}Edit User{{else}}Tambah User Baru{{end}}</h1>
</div>

{{if .Error}}
<div class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg text-sm mb-6">{{.Error}}</div>
{{end}}

<div class="max-w-lg bg-white rounded-xl border border-gray-200 p-6">
    <form method="POST" action="{{if .EditMode}}/users/{{.User.ID}}?_method=PUT{{else}}/users{{end}}">
        {{if .EditMode}}<input type="hidden" name="_method" value="PUT">{{end}}
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Username *</label>
                <input type="text" name="username" required value="{{if .User}}{{.User.Username}}{{end}}"
                    class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500 focus:border-teal-500 outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">{{if .EditMode}}Password Baru (kosongkan jika tidak diubah){{else}}Password *{{end}}</label>
                <input type="password" name="password" {{if not .EditMode}}required{{end}}
                    class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500 focus:border-teal-500 outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Nama *</label>
                <input type="text" name="name" required value="{{if .User}}{{.User.Name}}{{end}}"
                    class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500 focus:border-teal-500 outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Role</label>
                <select name="role"
                    class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500 focus:border-teal-500 outline-none">
                    <option value="superadmin" {{if and .User (eq .User.Role "superadmin")}}selected{{end}}>Superadmin</option>
                    <option value="admin" {{if and .User (eq .User.Role "admin")}}selected{{end}}>Admin</option>
                    <option value="user" {{if and .User (eq .User.Role "user")}}selected{{end}}>User</option>
                </select>
            </div>
        </div>
        <div class="flex gap-3 mt-6">
            <button type="submit" class="bg-teal-600 text-white px-6 py-2.5 rounded-lg font-semibold hover:bg-teal-700 transition">
                {{if .EditMode}}Simpan Perubahan{{else}}Buat User{{end}}
            </button>
            <a href="/users" class="bg-gray-100 text-gray-700 px-6 py-2.5 rounded-lg font-medium hover:bg-gray-200 transition">Batal</a>
        </div>
    </form>
</div>
{{end}}
