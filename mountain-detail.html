<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detail Gunung - Open Trip Marketplace</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            forest: '#064e3b',
            'forest-light': '#065f46',
          }
        }
      }
    }
  </script>
  <style>
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 pb-24">
  
  <!-- Hero Image -->
  <div class="relative h-64">
    <img id="hero-image" src="" alt="" class="w-full h-full object-cover">
    <div class="absolute inset-0 bg-gradient-to-t from-black/70 via-black/20 to-transparent"></div>
    
    <!-- Back Button -->
    <button onclick="history.back()" 
            class="absolute top-4 left-4 w-10 h-10 bg-white/90 rounded-full flex items-center justify-center shadow-lg z-10">
      <span class="text-lg">←</span>
    </button>
    
    <!-- Wishlist Button -->
    <button onclick="toggleWishlistDetail()" 
            class="absolute top-4 right-4 w-10 h-10 bg-white/90 rounded-full flex items-center justify-center shadow-lg z-10">
      <span id="detail-wishlist-icon" class="text-lg">🤍</span>
    </button>
    
    <!-- Mountain Info -->
    <div class="absolute bottom-4 left-4 right-4">
      <h1 id="mountain-name" class="text-white font-bold text-2xl mb-1"></h1>
      <div class="flex items-center space-x-3 text-white/80 text-sm">
        <span id="mountain-province"></span>
        <span id="mountain-height"></span>
        <span id="mountain-difficulty"></span>
      </div>
    </div>
  </div>

  <!-- Main Content -->
  <main class="max-w-md mx-auto px-4 -mt-4 relative z-10">
    
    <!-- Description Card -->
    <div class="bg-white rounded-2xl shadow-lg p-4 mb-4">
      <p id="mountain-desc" class="text-sm text-slate-600 leading-relaxed"></p>
      
      <div class="grid grid-cols-3 gap-3 mt-4">
        <div class="text-center p-2 bg-slate-50 rounded-xl">
          <span class="text-xl">⛰️</span>
          <p id="stat-height" class="text-sm font-bold text-slate-800 mt-1"></p>
          <p class="text-[10px] text-slate-500">Ketinggian</p>
        </div>
        <div class="text-center p-2 bg-slate-50 rounded-xl">
          <span class="text-xl">📊</span>
          <p id="stat-difficulty" class="text-sm font-bold text-slate-800 mt-1"></p>
          <p class="text-[10px] text-slate-500">Level</p>
        </div>
        <div class="text-center p-2 bg-slate-50 rounded-xl">
          <span class="text-xl">🏔️</span>
          <p id="stat-trips" class="text-sm font-bold text-slate-800 mt-1"></p>
          <p class="text-[10px] text-slate-500">Trip Aktif</p>
        </div>
      </div>
    </div>

    <!-- Map -->
    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-4 mb-4">
      <h3 class="font-bold text-slate-800 mb-3">🗺️ Lokasi</h3>
      <div id="map-container"></div>
    </div>

    <!-- Trip Filter & Sort -->
    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-4 mb-4">
      <div class="flex items-center justify-between mb-3">
        <h3 class="font-bold text-slate-800">🎒 Trip Tersedia</h3>
        <span id="trip-count" class="text-xs text-slate-500"></span>
      </div>
      
      <div class="flex space-x-2 overflow-x-auto hide-scrollbar mb-3">
        <button onclick="sortTrips('date')" 
                class="sort-btn px-3 py-1.5 bg-forest text-white rounded-lg text-xs font-medium whitespace-nowrap"
                data-sort="date">
          📅 Tanggal
        </button>
        <button onclick="sortTrips('price')" 
                class="sort-btn px-3 py-1.5 bg-white text-slate-600 border border-slate-200 rounded-lg text-xs font-medium whitespace-nowrap"
                data-sort="price">
          💰 Harga
        </button>
        <button onclick="sortTrips('rating')" 
                class="sort-btn px-3 py-1.5 bg-white text-slate-600 border border-slate-200 rounded-lg text-xs font-medium whitespace-nowrap"
                data-sort="rating">
          ⭐ Rating Operator
        </button>
      </div>
    </div>

    <!-- Trips List -->
    <div id="trips-container" class="space-y-3"></div>

  </main>

  <!-- Bottom Navigation -->
  <nav id="bottom-nav" class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 z-40 max-w-md mx-auto h-16 flex"></nav>

  <script src="assets/js/app.js"></script>
  <script>
    let currentMountain = null;
    let currentSort = 'date';

    // Load Mountain Data
    function loadMountain() {
      const mountainId = getURLParam('id');
      currentMountain = getMountainById(mountainId);
      
      if (!currentMountain) {
        showToast('Gunung tidak ditemukan', 'error');
        return;
      }
      
      // Update UI
      document.getElementById('hero-image').src = currentMountain.image;
      document.getElementById('hero-image').alt = currentMountain.name;
      document.getElementById('mountain-name').textContent = currentMountain.name;
      
      const province = PROVINCES.find(p => p.id === currentMountain.province);
      document.getElementById('mountain-province').textContent = `📍 ${province?.name || currentMountain.province}`;
      document.getElementById('mountain-height').textContent = `⛰️ ${currentMountain.height}`;
      
      const diffEl = document.getElementById('mountain-difficulty');
      diffEl.textContent = `📊 ${currentMountain.difficulty}`;
      diffEl.className = `text-sm ${currentMountain.difficulty === 'Sulit' ? 'text-red-300' : currentMountain.difficulty === 'Sedang' ? 'text-yellow-300' : 'text-green-300'}`;
      
      document.getElementById('mountain-desc').textContent = currentMountain.description;
      
      // Update stats
      document.getElementById('stat-height').textContent = currentMountain.height;
      document.getElementById('stat-difficulty').textContent = currentMountain.difficulty;
      document.getElementById('stat-difficulty').className = `text-sm font-bold mt-1 ${currentMountain.difficulty === 'Sulit' ? 'text-red-600' : currentMountain.difficulty === 'Sedang' ? 'text-yellow-600' : 'text-green-600'}`;
      
      const tripCount = getTripsByMountain(currentMountain.id).length;
      document.getElementById('stat-trips').textContent = tripCount;
      
      // Update wishlist icon
      updateWishlistIcon();
      
      // Render map
      if (currentMountain.location) {
        renderMap('map-container', currentMountain.location, currentMountain.location.zoom);
      }
      
      // Render trips
      renderTrips();
    }

    // Update Wishlist Icon
    function updateWishlistIcon() {
      const icon = document.getElementById('detail-wishlist-icon');
      if (isInWishlist(currentMountain.id)) {
        icon.textContent = '❤️';
      } else {
        icon.textContent = '🤍';
      }
    }

    // Toggle Wishlist
    function toggleWishlistDetail() {
      const isAdded = toggleWishlist(currentMountain.id);
      updateWishlistIcon();
      showToast(isAdded ? 'Ditambahkan ke wishlist' : 'Dihapus dari wishlist');
    }

    // Render Trips
    function renderTrips() {
      let trips = getTripsByMountain(currentMountain.id);
      
      // Sort
      if (currentSort === 'price') {
        trips.sort((a, b) => a.price - b.price);
      } else if (currentSort === 'rating') {
        trips.sort((a, b) => {
          const opA = getOperatorById(a.operator_id);
          const opB = getOperatorById(b.operator_id);
          return (opB?.rating || 0) - (opA?.rating || 0);
        });
      } else {
        // Sort by date
        trips.sort((a, b) => new Date(a.date_start) - new Date(b.date_start));
      }
      
      document.getElementById('trip-count').textContent = `${trips.length} trip tersedia`;
      const container = document.getElementById('trips-container');
      
      if (trips.length === 0) {
        container.innerHTML = `
          <div class="text-center py-8">
            <div class="text-4xl mb-2">📅</div>
            <p class="text-slate-500 text-sm">Belum ada trip untuk gunung ini</p>
          </div>
        `;
        return;
      }
      
      container.innerHTML = trips.map(trip => {
        const operator = getOperatorById(trip.operator_id);
        const isLowQuota = trip.quota_remaining < 5;
        
        return `
          <div onclick="navigateTo('trip-detail.html', {id: '${trip.id}'})" 
               class="bg-white rounded-2xl shadow-sm border border-slate-100 p-4 cursor-pointer active:scale-[0.98] transition-transform">
            
            <div class="flex items-center justify-between mb-3">
              <div class="flex items-center space-x-2">
                <img src="${operator?.logo || ''}" 
                     alt="${operator?.name || ''}" 
                     class="w-8 h-8 rounded-lg object-cover">
                <div>
                  <p class="text-xs font-semibold text-slate-800">${operator?.name || 'Operator'}</p>
                  <div class="flex items-center space-x-1">
                    <span class="text-[10px]">⭐</span>
                    <span class="text-[10px] text-slate-500">${operator?.rating || 0}</span>
                    ${operator?.verified ? '<span class="text-[10px] text-blue-500">✓ Terverifikasi</span>' : ''}
                  </div>
                </div>
              </div>
              <span class="text-lg font-bold text-orange-600">${formatPrice(trip.price)}</span>
            </div>
            
            <h4 class="font-bold text-slate-800 text-sm mb-2">${trip.name}</h4>
            
            <div class="space-y-1.5 mb-3">
              <div class="flex items-center text-xs text-slate-600">
                <span class="w-4">📅</span>
                <span>${formatDate(trip.date_start)} - ${formatDate(trip.date_end)}</span>
              </div>
              <div class="flex items-center text-xs text-slate-600">
                <span class="w-4">🛤️</span>
                <span>Jalur: ${trip.route}</span>
              </div>
              <div class="flex items-center text-xs text-slate-600">
                <span class="w-4">⏱️</span>
                <span>${trip.duration}</span>
              </div>
            </div>
            
            <div class="flex items-center justify-between pt-3 border-t border-slate-100">
              <span class="text-xs ${isLowQuota ? 'text-red-500 font-semibold' : 'text-green-600'}">
                ${isLowQuota ? '🔥' : '✅'} Sisa ${trip.quota_remaining} slot
              </span>
              <span class="px-3 py-1 bg-forest text-white text-xs font-medium rounded-lg">
                Lihat Detail
              </span>
            </div>
          </div>
        `;
      }).join('');
    }

    // Sort Trips
    function sortTrips(sortBy) {
      currentSort = sortBy;
      
      // Update button styles
      document.querySelectorAll('.sort-btn').forEach(btn => {
        if (btn.dataset.sort === sortBy) {
          btn.className = 'sort-btn px-3 py-1.5 bg-forest text-white rounded-lg text-xs font-medium whitespace-nowrap';
        } else {
          btn.className = 'sort-btn px-3 py-1.5 bg-white text-slate-600 border border-slate-200 rounded-lg text-xs font-medium whitespace-nowrap';
        }
      });
      
      renderTrips();
    }

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      loadMountain();
      renderBottomNav();
    });
  </script>
</body>
</html>
