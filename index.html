<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Open Trip Marketplace</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            forest: '#064e3b',
            'forest-light': '#065f46',
            'forest-dark': '#022c22',
          }
        }
      }
    }
  </script>
  <style>
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .snap-x { scroll-snap-type: x mandatory; }
    .snap-start { scroll-snap-align: start; }
    .line-clamp-2 {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 pb-20">
  
  <!-- Sticky Header -->
  <header class="sticky top-0 z-40 bg-forest shadow-lg">
    <div class="max-w-md mx-auto px-4 py-3">
      <div class="flex items-center mb-3">
        <div class="flex items-center space-x-2">
          <span class="text-2xl">🏔️</span>
          <div>
            <h1 class="text-white font-bold text-lg leading-tight">Open Trip</h1>
            <p class="text-white/70 text-[10px]">Marketplace</p>
          </div>
        </div>
      </div>
      
      <div id="search-container"></div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="max-w-md mx-auto">
    
    <!-- Hero Banner -->
    <div class="relative h-48 bg-gradient-to-r from-forest to-forest-light overflow-hidden">
      <img src="https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=600&q=80" 
           alt="Mountain" 
           class="absolute inset-0 w-full h-full object-cover opacity-40">
      <div class="relative z-10 px-4 py-6">
        <p class="text-orange-400 font-semibold text-sm mb-1">Jelajahi Gunung Indonesia</p>
        <h2 class="text-white text-2xl font-bold mb-2">Temukan Trip Terbaikmu</h2>
        <p class="text-white/80 text-sm">Pilih gunung, lihat trip dari berbagai operator, booking dengan mudah</p>
      </div>
    </div>

    <!-- Section: Provinsi -->
    <section class="px-4 py-6">
      <div class="flex items-center justify-between mb-4">
        <h3 class="font-bold text-lg text-slate-800">Jelajahi Provinsi</h3>
        <span class="text-xs text-slate-500">Pulau Jawa</span>
      </div>
      
      <div id="provinces-container" class="flex space-x-3 overflow-x-auto hide-scrollbar snap-x pb-2"></div>
    </section>

    <!-- Section: Trending Gunung -->
    <section class="px-4 pb-6">
      <div class="flex items-center justify-between mb-4">
        <h3 class="font-bold text-lg text-slate-800">🔥 Trending</h3>
        <button onclick="showAllMountains()" class="text-orange-500 text-sm font-medium">Lihat Semua</button>
      </div>
      
      <div id="trending-container" class="space-y-3"></div>
    </section>

    <!-- Section: Gunung Populer (by active trips) -->
    <section class="px-4 pb-6">
      <div class="flex items-center justify-between mb-4">
        <h3 class="font-bold text-lg text-slate-800">⭐ Pilihan Terbaik</h3>
      </div>
      
      <div id="popular-container" class="space-y-3"></div>
    </section>

    <!-- Section: Top Operators -->
    <section class="px-4 pb-6">
      <div class="flex items-center justify-between mb-4">
        <h3 class="font-bold text-lg text-slate-800">🏆 Operator Terbaik</h3>
        <button onclick="navigateTo('operators.html')" class="text-orange-500 text-sm font-medium">Lihat Semua</button>
      </div>
      
      <div id="operators-container" class="space-y-3"></div>
    </section>

    <!-- Section: Wishlist Preview -->
    <section id="wishlist-section" class="px-4 pb-6 hidden">
      <div class="flex items-center justify-between mb-4">
        <h3 class="font-bold text-lg text-slate-800">❤️ Wishlist</h3>
      </div>
      <div id="wishlist-container" class="space-y-3"></div>
    </section>

  </main>

  <!-- Bottom Navigation -->
  <nav id="bottom-nav" class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 z-40 max-w-md mx-auto h-16 flex"></nav>

  <script src="assets/js/app.js"></script>
  <script>
    // Helper: Get active trip count for a mountain
    function getMountainActiveTrips(mountainId) {
      return TRIPS.filter(t => t.mountain_id === mountainId).length;
    }

    // Helper: Get trip count for a province
    function getProvinceTripCount(provinceId) {
      const mountainsInProvince = MOUNTAINS.filter(m => m.province === provinceId).map(m => m.id);
      return TRIPS.filter(t => mountainsInProvince.includes(t.mountain_id)).length;
    }

    // Helper: Get trip count for an operator
    function getOperatorTripCount(operatorId) {
      return TRIPS.filter(t => t.operator_id === operatorId).length;
    }

    // Helper: Get operator with most trips for a mountain
    function getBestOperatorForMountain(mountainId) {
      const trips = TRIPS.filter(t => t.mountain_id === mountainId);
      if (trips.length === 0) return null;
      
      const operatorCounts = {};
      trips.forEach(t => {
        operatorCounts[t.operator_id] = (operatorCounts[t.operator_id] || 0) + 1;
      });
      
      const bestOpId = Object.keys(operatorCounts).reduce((a, b) => operatorCounts[a] > operatorCounts[b] ? a : b);
      return getOperatorById(bestOpId);
    }

    // Helper: Get best price for a mountain
    function getBestPriceForMountain(mountainId) {
      const trips = TRIPS.filter(t => t.mountain_id === mountainId);
      if (trips.length === 0) return 0;
      return Math.min(...trips.map(t => t.price));
    }

    // Render Provinces
    function renderProvinces() {
      const container = document.getElementById('provinces-container');
      container.innerHTML = PROVINCES.map(prov => `
        <div onclick="navigateTo('search-results.html', {province: '${prov.id}'})" 
             class="snap-start flex-shrink-0 w-28 cursor-pointer group">
          <div class="relative rounded-2xl overflow-hidden aspect-square mb-2">
            <img src="${prov.image}" 
                 alt="${prov.name}" 
                 class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-300">
            <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent"></div>
            <span class="absolute bottom-2 left-2 text-white text-xs font-semibold">${getProvinceTripCount(prov.id)} Trip</span>
          </div>
          <p class="text-sm font-semibold text-slate-700 text-center">${prov.name}</p>
        </div>
      `).join('');
    }

    // Render Trending Mountains
    function renderTrending() {
      const trending = MOUNTAINS.filter(m => m.trending);
      const container = document.getElementById('trending-container');
      container.innerHTML = trending.map(mountain => `
        <div onclick="navigateTo('mountain-detail.html', {id: '${mountain.id}'})" 
             class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden cursor-pointer active:scale-[0.98] transition-transform">
          <div class="relative h-40">
            <img src="${mountain.image}" 
                 alt="${mountain.name}" 
                 class="w-full h-full object-cover">
            <div class="absolute inset-0 bg-gradient-to-t from-black/70 via-black/20 to-transparent"></div>
            
            <button onclick="event.stopPropagation(); toggleWishlistIcon('${mountain.id}')" 
                    class="absolute top-3 right-3 w-8 h-8 bg-white/90 rounded-full flex items-center justify-center shadow-md"
                    id="wishlist-btn-${mountain.id}">
              <span class="${isInWishlist(mountain.id) ? 'text-red-500' : 'text-slate-300'}">❤️</span>
            </button>
            
            <div class="absolute bottom-3 left-3 right-3">
              <h4 class="text-white font-bold text-base">${mountain.name}</h4>
              <div class="flex items-center justify-between">
                <div class="flex items-center space-x-2 text-white/80 text-xs">
                  <span>⛰️ ${mountain.height}</span>
                  <span class="${mountain.difficulty === 'Sulit' ? 'text-red-300' : mountain.difficulty === 'Sedang' ? 'text-yellow-300' : 'text-green-300'}">
                    📊 ${mountain.difficulty}
                  </span>
                </div>
                <span class="text-xs font-semibold text-orange-300">${getMountainActiveTrips(mountain.id)} trip</span>
              </div>
            </div>
          </div>
          
          <div class="p-3">
            <p class="text-xs text-slate-500 line-clamp-2 mb-2">${mountain.description}</p>
            <div class="flex items-center justify-between">
              <span class="text-xs text-slate-400">Mulai dari</span>
              <span class="text-sm font-bold text-orange-600">${formatPrice(getBestPriceForMountain(mountain.id))}</span>
            </div>
          </div>
        </div>
      `).join('');
    }

    // Render Popular Mountains (non-trending but with many trips)
    function renderPopular() {
      const popular = MOUNTAINS.filter(m => !m.trending && getMountainActiveTrips(m.id) > 0).slice(0, 3);
      const container = document.getElementById('popular-container');
      
      if (popular.length === 0) {
        container.innerHTML = '';
        return;
      }
      
      container.innerHTML = popular.map(mountain => `
        <div onclick="navigateTo('mountain-detail.html', {id: '${mountain.id}'})" 
             class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden cursor-pointer active:scale-[0.98] transition-transform">
          <div class="flex">
            <div class="w-28 h-28 flex-shrink-0">
              <img src="${mountain.image}" 
                   alt="${mountain.name}" 
                   class="w-full h-full object-cover">
            </div>
            <div class="flex-1 p-3 flex flex-col justify-between">
              <div>
                <div class="flex items-center justify-between mb-1">
                  <h4 class="font-bold text-slate-800 text-sm">${mountain.name}</h4>
                  <button onclick="event.stopPropagation(); toggleWishlistIcon('${mountain.id}')" 
                          class="text-lg ${isInWishlist(mountain.id) ? 'text-red-500' : 'text-slate-300'}"
                          id="wishlist-pop-${mountain.id}">
                    ❤️
                  </button>
                </div>
                <div class="flex items-center space-x-2 text-[10px] text-slate-400 mb-1">
                  <span>⛰️ ${mountain.height}</span>
                  <span class="${mountain.difficulty === 'Sulit' ? 'text-red-500' : mountain.difficulty === 'Sedang' ? 'text-yellow-600' : 'text-green-600'}">
                    📊 ${mountain.difficulty}
                  </span>
                </div>
              </div>
              <div class="flex items-center justify-between">
                <span class="text-xs text-slate-400">${getMountainActiveTrips(mountain.id)} trip tersedia</span>
                <span class="text-xs font-semibold text-orange-600">${formatPrice(getBestPriceForMountain(mountain.id))}</span>
              </div>
            </div>
          </div>
        </div>
      `).join('');
    }

    // Render Top Operators
    function renderOperators() {
      const container = document.getElementById('operators-container');
      container.innerHTML = OPERATORS.slice(0, 5).map((op, index) => `
        <div onclick="navigateTo('operator-detail.html', {id: '${op.id}'})" 
             class="bg-white rounded-2xl shadow-sm border border-slate-100 p-3 flex items-center space-x-3 cursor-pointer active:scale-[0.98] transition-transform">
          <div class="relative">
            <img src="${op.logo}" 
                 alt="${op.name}" 
                 class="w-12 h-12 rounded-xl object-cover">
            ${op.verified ? `<span class="absolute -bottom-1 -right-1 w-4 h-4 bg-blue-500 rounded-full flex items-center justify-center text-white text-[8px]">✓</span>` : ''}
          </div>
          <div class="flex-1">
            <h4 class="font-bold text-sm text-slate-800">${op.name}</h4>
            <div class="flex items-center space-x-3 text-xs text-slate-500">
              <span>⭐ ${op.rating}</span>
              <span>🏔️ ${getOperatorTripCount(op.id)} trip</span>
            </div>
          </div>
          <span class="text-slate-400">></span>
        </div>
      `).join('');
    }

    // Render Wishlist
    function renderWishlist() {
      const wishlistIds = getWishlist();
      const section = document.getElementById('wishlist-section');
      const container = document.getElementById('wishlist-container');
      
      if (wishlistIds.length === 0) {
        section.classList.add('hidden');
        return;
      }
      
      section.classList.remove('hidden');
      const wishlistMountains = MOUNTAINS.filter(m => wishlistIds.includes(m.id));
      
      container.innerHTML = wishlistMountains.map(mountain => `
        <div onclick="navigateTo('mountain-detail.html', {id: '${mountain.id}'})" 
             class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden cursor-pointer">
          <div class="flex">
            <div class="w-24 h-24 flex-shrink-0">
              <img src="${mountain.image}" 
                   alt="${mountain.name}" 
                   class="w-full h-full object-cover">
            </div>
            <div class="flex-1 p-3">
              <h4 class="font-bold text-slate-800 text-sm">${mountain.name}</h4>
              <p class="text-xs text-slate-500">${PROVINCES.find(p => p.id === mountain.province)?.name}</p>
              <div class="flex items-center justify-between mt-1">
                <span class="text-xs text-slate-400">${getMountainActiveTrips(mountain.id)} trip</span>
                <span class="text-xs font-semibold text-orange-600">${formatPrice(getBestPriceForMountain(mountain.id))}</span>
              </div>
            </div>
          </div>
        </div>
      `).join('');
    }

    // Toggle Wishlist Icon
    function toggleWishlistIcon(mountainId) {
      const isAdded = toggleWishlist(mountainId);
      showToast(isAdded ? 'Ditambahkan ke wishlist' : 'Dihapus dari wishlist');
      renderWishlist();
      
      // Update all wishlist buttons for this mountain
      document.querySelectorAll(`[id*="wishlist-${mountainId}"]`).forEach(btn => {
        btn.className = `text-lg ${isAdded ? 'text-red-500' : 'text-slate-300'}`;
      });
    }

    // Show All Mountains
    function showAllMountains() {
      navigateTo('search-results.html');
    }

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      renderProvinces();
      renderTrending();
      renderPopular();
      renderOperators();
      renderWishlist();
      renderSearchBar('search-container', null);
      renderBottomNav('home');
    });
  </script>
</body>
</html>
